杵從窗眼走入白諸佛曰諸佛世尊莫作是說近有一等狂禪和開口便道無佛無祖撥無因果招殃惹禍今佛更道禮佛者增益罪過未免為豁達空者張本永造無間業去也諸佛曰咄我等各分身萬億在一切人八萬四千毛孔中橫入竪出又豈可道無佛若作是解更入地獄如箭射兩相理論不已小長老夜深欲睡鳴指一下一齊逐退今日不可不對衆决斷召衆云若道禮佛還曾見佛也未若道無佛可禮如何說無佛的道理於此透去一任你道有佛可禮也得無佛可禮也得小長老敢保你禮佛諸佛不敢正眼視著說無佛諸佛不敢正耳𦗟著不然𥁞是造大妄語當墮地獄的漢子莫言無人說過驀拈杖云者兩種人喫得痛棒皆可因邪打正更有一等知有佛而甘心不見佛懶惰不禮佛正如焦芽敗種那有喫棒分擲下柱杖小參師拈柱杖云千日竝照那有一毫隱晦處虛空通達那有一毫隔礙處某上座在母腹中便轉大法輪出頭斯世阿誰謾得到磬山見先師和尚亦有甚奇特處敢誑謔人諸方珍重傳受辛苦參討的五家宗旨一齊勘破縱顛縱狂輕佛慢祖自號無師子不意先師肯我是狂竟付生平不輕付之拂子拜違荊谷掩室江干因蓉城請先和尚先師不赴請寄書某上座言有末後付囑某上座呵呵大笑因破關來見先師義手問云狂兒國土父不容過者個峯頭還是老漢住處麼先師云且站下腳與你道某便掀倒香案而出先師高聲云將柱杖來某遙𦗟得笑云劍去久矣室中復理論多端一日先師上堂維那擬白椎某便喝住云待我問了話白椎問云昔日黃檗道大唐國裏無禪師如今大明國裏還有麼先師拈柱杖作打勢云看棒某便喝先師亦喝某復喝一喝轉身云不是狂兒多意氣秪因曾透上頭關便出先師又喝某亦喝遙聞維那重白椎某乃高聲云歎死氣吁嗟乎仰山道的誰是知音先師示寂便欲縛屋萬峯誰意有此不了公案衆居士等堅請為先師了卻某上座既到者裏必欲衆兄弟洞明大法不向他人行處行若不奮大人志氣不知道出常情向瞎老禿口角邊覓涕唾喫聽他說黃道黑只管記憶思惟日久月深多成異解或認穿衣喫飯舉足動步的為自性或以暫歇塵勞為究竟直饒得見法身竿頭進步那邊會得者邊行履見與師齊減師半德要透末後牢關未在未在且道知有末後一著如兜率悅張無𥁞時如何咄雲菴老人在你腳下且置是事昔日白雲端禪師已肯五祖演悟處乃未幾時忽語之曰有數禪客自廬山來皆有悟入處教伊說亦說得有來繇舉因緣問伊亦明得教伊下語亦下得秪是未在祖於是大疑私自計曰既悟了說亦說得明亦明得如何卻未在遂參究纍日忽然省悟從前寶惜一時放下走見白雲雲為手舞足蹈祖亦一笑而已如今妄為師範的老禿奴還有個般手眼鍛鍊人麼奔南走北漫稱𠫵學的無慚愧漢還受得明眼作家如是鉗錘麼若不識古人者個作略則馬祖喝黃檗棒興化罰𢷤一槩意思閒放過為師者見人略有些見處便與他一個冬瓜印子學者無大人志氣要人許可便入邪師圈繢豈不大可哀哉盲引衆盲解說五家宗旨分而不分不分而分靣皮厚多少本子上念將去口傳耳受去欲扶持從上綱宗真可憐生還曾夢見古人汗臭氣麼一僧出衆云和尚又作麼生道師云若有所道何異邪解僧禮拜師連棒打云切忌謗我乃顧左右云才見某上座欲提持此事便推翻香案拗折柱杖令某上座無開口處猶較些子若如此總受人謾了也更討甚麼碗拽杖歸方丈小參師拈柱杖云千鈞之弩不為鼷鼠發機萬丈之𮈔顓為鯨鯢設釣有麼良久云大丈夫莫自遲疑莫自間隔似鳥飛空何東何西而不空如魚在水何順何逆而非水某上座者裏竝無實法與人亦無定法限人不起期結制畫地為牢不做樣粧模誑謔愚瞽行的一任行坐的一任坐某上座敢保諸人坐也釋迦彌勒左右侍立行也飲光達磨前後追隨無人無時不向毗盧頂上行有甚禪可參有甚道可學秪是諸人亦有自己放不過的還知病根在甚處麼竪柱杖云人既自放不過柱杖子亦不放過看取打草驚蛇舉僧問乾峯十方薄伽梵一路涅槃門未審路頭在甚麼處峯以柱杖畫一畫云在者裏僧又問雲門門乃拈起扇子云扇子𨁝跳上三十三天築著帝釋鼻孔東海鯉魚打一棒雨似盆傾師云者則因緣議論的類牛毛判斷的同兔角某上座不怕諸方簡點分明判斷去也者僧終日長安更向旁人問路所謂道在邇而求諸遠事在易而求諸難忒殺癡狂那堪乾峯雲門不與本分草料雖各是一等為人未免轉轉鈍置若報恩門下有人出來問十方薄伽梵一路涅槃門未審路頭在甚麼處便劈脊打出或其忽爾瞥地自合知羞驀喝一喝以柱杖拍香案一下歸方丈懸板小參師云虛空雖久此板彌堅天地雖弘此板彌大遍法界無內無外亘古今不變不遷晝夜六時出微妙音成殊勝事聾者聆之耳根圓聞瞽者睹之目根圓見病者繇之得瘥苦者繇之停酸一切縛著者莫不繇之解脫然而全憑有福慧人一念信心一念肯心彰著如是不思議事當知錢居士鑄此報恩禪寺香積堂大板頓令十方世界齊成大板恆沙佛土舉凡香積堂大板一時成就新報恩擊此大板而此板無刻無地不鳴如斯見徹方顯我宗檀越迥異尋常我宗真個道出常情不同流俗見解不是粥飯師僧且道既是十方世界都成大板喚甚作十方世界既是十方世界又如何說個都成大板的道理到者裏須是舉一明三目機銖兩所以道事是過量事人須過量人但得過量人自明過量事鳴板云知音不用頻頻舉識者應知暗點頭懸鐘板小參師指鐘板云倩二上座為大衆早晚發機普願若遠若近見者聞者同露柱知音共磉盤唱和喝一喝休去早參師云臨濟大師道有時奪人不奪境有時奪境不奪人有時人境兩俱奪有時人境俱不奪今時學者大法不明開眼作夢一味依樣畫貓何異韓盧逐塊召衆云切莫見說奪人不奪境但向境上粧點兩句見說奪境不奪人但向人上粧點兩句要明濟上綱宗須識取有時二字始得有時奪人不奪境你作麼生領覽有時奪境不奪人你作麼生擔承有時人境兩俱奪你作麼生當抵有時人境俱不奪你作麼生步趨山僧不惜眉毛更為諸人頌出奪人不奪境滿栽華柳風醉遊人疏影橫斜逋客獨醒奪境不奪人脫帽忘鋤羅敷有夫五馬踟躇使君何愚人境俱奪破楚鞭尸逆行倒施我必復之秦為出師人境俱不奪桃華夾岸雞黍延賔洞口徑窄人誰問津顧左右云久立珍重晚參師云僧問趙州如何是不蹉路州云識心見性是不蹉路師左右顧視云心作麼生識性作麼生見良久拈柱杖云敢來者裏瞌睡旋風打散小參師云昔日香嚴禪師垂語云若論此事如人上𣗳口銜𣗳枝腳不踏枝手不攀枝𣗳下忽有人問如何是祖師西來意不對他又違他所問若對他又喪身失命當恁麼時作麼生即得如今人𥁞道達磨大師無當門齒殊不知香嚴老子倍甚有人識得先聖赤心片片山僧當將山河大地揑作一個大饅頭以為供養高聲召大衆驀歸方丈晚參師云昔日達磨大師到東土來指示人云心如墻壁可以入道如今許多大衆在者裏有幾個心如墻壁的如何得入道若有透得過的出來與柱杖子相見我也不敢鈍置你若透不過也不得孤負達磨大師來者一番良久師云久立珍重長至日舉勇首座立僧小參師乃云如何是正法眼破砂盆只者一轉語三玄五位縱橫父子體用殊特目前包裹天長地久日月齊明一鏃破三關雲從龍風從虎恁麼會得可與建法幢立宗旨然而未明向上一竅在且道如何是向上一竅問取堂中首座勇小參師拍香案云山僧等閒一拍山河大地明暗色空情與無情一時百雜碎秪有一個頑禪和打不死無如之何衆中有高明的出來為我設個方便拈柱杖云木上座出來道某甲有個方便罰他向飯籮邊餓死大海裏渴死師呵呵大笑云上座你者樣說話慈悲耶惡毒耶擲柱杖云從教彼禪和自己簡點元旦小參問證得虛空時無是無非法請問虛空作麼生證師云梅清滿谷問新年頭佛法古人道有道無和尚者裏又如何師云前溪水急後嶺風高師乃云昨日法座已為諸人說法了也諸人還信得及麼若信得及則普天同慶若信不及未免堆華錦上起身云新春兩序頭首合寺大衆起居萬福晦日晚參師顧左右云三冬一月去水牯尚顢頇坐香人瞌睡露柱腿生酸諸上座好生觀青山𨁝跳溪聲住柴牀木枕語喃喃望日早參師云禪林秋晚學道之士貴乎一切真實顓為生死不爭人我是發心真實切問近思不學虛頭是參問真實一一從胸襟流出蓋天蓋地是酬唱真實好賢樂善成人道業是領衆真實省虛文務誠敬是禮貌真實誡浮華崇節儉是日用真實遠奸侫近仁厚是交接真實明因果識罪福去害除弊是任事真實甘淡泊恥謀求是家風真實更有一處真實一發與諸人道破大抵還他肌骨好不搽紅粉也風流舉森首座立僧小參師拈柱杖云山僧有時一句子在諸人日用中諸人若向日用處會未免觸途成滯山僧有時一句子無你諸人用心處諸人若向無用心處會未免當靣蹉卻山僧有時一句子八角磨盤空裏走諸人若作八角磨盤空裏走會轉見白雲萬里所以道一句中具三玄一玄中具三要有權有實有照有用千日竝照不足喻其明千雷竝吼不足喻其威第一句中薦得方可與佛祖為師且道如何是第一句卓柱杖云問取堂中森首座晚參師云今時學者每易自足少有久長親師擇友的即親近人亦少朝參暮究日臻玄奧的自足之患最為法門大禍山僧午夜時零風穴之淚惟恐穿鑿顢頇順朱填墨三種弊病復見於將來佛祖大法真有𮈔懸九鼎之危此間兄弟深造極詣者亦豈能多得然耐長忍苦未嘗無人秪如臨濟大師道大凡演唱宗乘一句須具三玄門一玄門須具三要有權有實有照有用汝等作麼生會還有人看破臨濟大師也未聽取山僧頌出舉尾知頭南泉趙州月來昨夜去矣君候敲空作響遐哉溈仰不負耽源燒卻圓相回互不互石頭滑路弗會佛法東西密付人來靣壁手眼通身高山流水別有知音輥出木球爍破髑髏收來舊處把櫓看鉤吸𥁞西江全生全殺奔逸絶塵鞭影一踏直饒山僧恁麼道要夢見臨濟大師汗臭氣也未在驀卓柱杖喝一喝晚參問世尊拈華迦葉微笑笑個甚麼師云咬人矢橛不是好狗師乃云𥁞十虛渾成一塊頑鐵多少人自生穿鑿自生喫跌屈千里卻同風對靣不相識解冬小參問答不録師乃云𥁞大地撮來粟米大不會打入普請看古人恁麼道如將百二十斤擔子加在諸人肩上若是承當得的各各安家樂業如或未然一任東觸西觸檀越請小參問共聞無量壽佛名未審無量壽佛在何處安身立命師云階下五湖源師拈柱杖云濶濶秋空遠海山鼎峙青裏糧明祖意拈出萬年藤卓柱杖喝一喝下座冬至晚參師云學道者學至無可學說法者說至無可說何故聻學道者求了生死殊不知本無生死了甚生死若言有道可學有生死可了斯人未在說法者因人迷妄執有生死為說悟法示了生死殊不知本無迷悟何法可說若言有法可說有生可利斯人未在雖然如是直饒山僧恁麼道合喫三十柱杖汝等諸人上來下去好不丈夫以柱杖旋風打散晚參師云拈華微笑肇祖開宗數千年來源深流遠青出於藍代不乏人或拈或頌或抑或揚日月光天德山河著地靈殊不知清光萬古穿鑿浮雲讚歎也讚歎不及評論也評論不及抑之如打水平江揚之如負土足嶽師乃竪拂召衆云大衆道看良久云一𮈔寒撒千江外漠漠魚龍動地雷元旦小參師云雲鋤雪築冰臥風餐忙忙百十僧個個無一事壬辰正月一山僧普為大衆一切授記長者長法身短者短法身佛子住此地則是佛受用經行及坐臥常在於其中結制小參師云十方無壁四靣無門一念萬年古今不異有甚堂內堂外說甚結制解制諸禪客丘壑人須自有一盂靜撥煙霞晚參舉趙州勘婆話師云僧問臺山路如何云驀直去僧便去如何云好個師僧又恁麼去也前來師僧也恁麼後來趙州也恁麼那裏是看破處一僧作禮云打鼓普請看師云儱侗禪和如麻似粟一僧云昨日晴今日雨師云三十棒且待別時一僧云車不橫推理無曲斷師云多少人恁麼道打出去也師乃云聽取山僧重說頌言十五日前用錐便十五日後用鉤捷正當十五日鉤錐一齊歇一個失錢遭罪一個弄巧成拙是他過量人荒草深深入晚參衆問話畢師良久顧左右云南閻浮提石頭大的大成佛小的小成佛汝等諸人為甚在此粧村以柱杖旋風打散解制小參知浴問今日小參事如何師云念汝辛勤進云某甲一口吞𥁞山河大地諸佛還有站身處也無師云恁麼施主得安樂師乃云道人降世無非與人作同事攝粗衣蔽體糲食充饑此外復有何事毫釐繫念三塗業因瞥爾情生萬劫羈鎖如人飲水冷暖自知前日同衆坐三因僧舉鳶飛戾天魚躍於淵山僧徵云作麼生說察的道理如今有人下得語麼衆答話畢師云山僧自道取黑住緗溪扣冰小參師拈柱杖云百草頭釋迦努目閙市裏彌勒攢眉三家村裏廖胡子惡發衝破三十三天琉璃殿角壓碎南海波斯大拇指且道什麼人解救得良久卓柱杖云參晚參師云昨日齊主請小參山僧云端坐受供養施主常安樂大衆還會麼若也會得十方薄伽梵一路涅槃門釋迦不在前彌勒不在後如或未然喫水防噎喫醬防渴草菴晚參師高聲召大衆衆無語師乃云點即不到衆僧競出問話師左右顧視云入戶已知來見解何須更舉轢中泥拈杖打散江上敔山菴小參師云今時人學道如在洪波大海中中有吞舟之魚旁有羅剎鬼國岸有罔人修羅天際真人遺下鐵葉方寸許有智之士穩坐飛渡始得如或捕影撈空難免羅剎鬼國等難古德云禪乃無文字之教教乃有文字之禪端能明教定許會禪若不會禪焉能明教何以言之教乃佛語禪乃佛心不明佛心而會佛語有是理乎秪如圓覺經云居一切時不起妄念於諸妄心亦不息滅住妄想境不加了知於無了知不辨真實如今人於此等言句容易看得過殊不知醍醐毒藥毫釐有差天地懸隔未入道者居一切時如何不起妄念既不起妄念如何於諸妄心亦不息滅此如茫茫大海中渾無著落者是也有等一知半解得少為足者便道逢飯喫飯要困便困淫坊酒肆不礙菩提逆行順行一切不管所謂豁達空撥因果莾莾蕩蕩招殃禍此如不葬吞舟之腹即墮羅剎修羅之手山僧不惜眉毛為人頌出竹露團光漾碧湍幽人琴罷倚闌干隔溪風轉苕花白對對青蟲撲水寒晚參師云天氣漸寒與大衆每人一箇大火爐還各各受用得著麼良久云莫將閒意解埋沒祖師心晚參師云汝等諸人莫好高務奇莫趨難行嶮但把身心世界一齊放却正恁麼時看是甚麼境界驀喝一喝云道明上座騎大𢈔嶺向諸人八萬四千毛孔中橫入竪出見有多人不薦却向曹溪禮拜六祖大師全身去也晚參師云看看山僧一口吞却諸上座了也諸上座還聞得山僧矢臭氣麼良久驀掩卻室門丙申佛誕小參師拈柱杖云三年不事事強起答羣賢未了先師案塔根臥冷煙衆問話畢師云告汝大衆同此荒寒岑寂參禪莫作參禪會行行莫作行行會行行若作行行會未免隨邪逐惡觸途成滯參禪若作參禪會未免眼中著釘靣門塗炭直饒雲門道釋迦老子初生一手指天一手指地周行七步目顧四方云天上天下唯吾獨尊山僧若見一棒打殺與狗子喫貴圖天下太平切忌承虛接響何故我王庫內無如是刀高聲召云大衆驀卓柱杖一時打散結制夜小參師云告汝內外大衆普請無動無靜絶情絶解各各圓證自己本來靣目從上佛祖是汝兒孫三乘十二分教是甚拭不淨紙自是不歸歸便得故園風月有誰爭晚參師云古德見人入門便棒我者裏為甚麼容許多人住衆無語師驀喝一喝云把住直教龍象畏放行且與鳥禽閒晚參師拈柱杖云汝諸大衆各住不思議之地為甚自討許多生受不能得大解脫衆擬議師震威一喝云散去晚參師云一日三餐把施主好茶飯𥁞成渣滓一月六參把先宗標格𥁞成世諦流布蒼天蒼天晚參師云趙州老漢面目現在且道作麼生與他相見驀喝一喝乃云聽取重說頌言道有道無心甜口苦告汝諸人莫莾鹵仔細隄防大雄山下虎歸報恩晚參師云有人走到拄杖子下來不與他拄杖子喫有人回避拄杖子卻與他拄杖喫且道喫拄杖子的是不喫拄杖子的是後堂云知音不必頻頻舉達者須知暗點頭師休去檀越請小參問答畢師卓拄杖云大衆會麼若會則靈山一會儼然未散如或未然則金剛圈栗棘蓬作麼生吞作麼生透舉拄杖云看看汾陽祖師來也一句明明該萬象重陽九日菊花新擲拄杖喝一喝下座檀越請小參問答畢師拈拄杖云學般若菩薩須識取真子真孫識得真子孫便識得真父母識得真父母便識得真自己識得真自己方知無死無生無聚無散無苦無樂方知本無自己本無父母本無子孫本無天地本無萬物本無佛祖本無衆生不妨於此中示有佛祖示有衆生示有天地示有萬物示有自己示有父母示有子孫示有生死示有聚散示有苦樂方知示有苦樂本無苦樂示有聚散本無聚散示有生死本無生死示有自己本無自己示有父母本無父母示有子孫本無子孫示有萬物本無萬物示有天地本無天地示有衆生本無衆生示有佛祖本無佛祖夫是之謂真佛祖夫是之謂真自己夫是之謂真父母夫是之謂真子孫竪拄杖云以此舉揚般若之力回向法界有情齊圓種智卓拄杖喝一喝下座開山老和尚忌日早參師云清淨法身本無出沒大悲願力示有去來古人恁麼道山僧則不然大悲願力本無去來清淨法身示有出沒初八晚請小參師云彌勒真彌勒分身千百億時時示時人時人自不識現前諸賢還識得大肚皮老漢麼若識得布施一句子與大衆結緣如無人道山僧自道去也中旭上座到處作齊不曾供養一人山中大衆兩度喫饅頭不曾咬著一些師復云結制在邇更有一事白汝大衆本山半月半月誓神務在清衆同居各須戒行清楚因果分明若或未然未結制前速自起單羯磨證戒非同兒戲丙申冬過大雄晚參師驀喝一喝衆禮拜師云半得半失師歸報恩檀越請小參師云祖師西來別無奇特秪要當人信得自己是佛見自本來面目祖師門下客若不離心意識絶聖凡路如何得見本來面目所以祖師又示人向未生前薦取堪笑堪嗟十箇五雙口說未生前秪向生後著倒上等外道以了不可得為究竟無靣目為真靣目此在生後著倒了也下等外道以運轉施為為本來靣目此在生後著倒了也中等外道以覓時則無用時則有為本來靣目此在生後著倒了也不見臺山婆子他雖是箇婦人宛有丈夫之作僧問臺山路向甚處去婆云驀直去僧便去婆云好箇師僧又恁麼去也趙州老漢不肯孤負他謂衆云臺山婆子我與汝勘破了也此如千年古鏡經磨而愈見光明百鍊精金遇煆而彌呈光彩多少隨邪逐惡依語生解者胡拈妄舉還知錯下一轉語墮五百生野狐身麼所以道識法者懼晚參師云僧問雲門一念不生還有過也無門云須彌山大衆還知好惡麼後來雪竇顯禪師問智門云一念不生為甚麼有過門召近前竇近前門便打竇擬開口門又打大衆還知棒頭落處麼良久云龍躍桃花浪癡人戽夜塘晚參師顧視左右云大家在者裏各各不得自暴自棄良久云看腳下音釋闖丑禁切琛去聲汞胡孔切洪上聲水銀莽鹵上母黨切茫上聲下郎古切音魯莽鹵輕脫苟且也戽故切呼去聲杼水器
