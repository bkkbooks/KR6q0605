body:
  text: 嗣法門人行嶽編小參一晚參師拈柱杖云我此山中一物也無石頭大的大小的小內外諸人每日出坡三兩度驀有個漢出來道和尚前言不應後語但向他道非汝境界顧左右云若也會得許你不咬一粒米大碗喫飯不挂一縷𮈔終日著衣若也不會不是逐色隨聲即落解脫深坑大衆到者裏切須仔細良久卓柱杖云參晚參師拈柱杖云當初龐居士到百尺竿頭將謂見過於人開口便道不與萬法為侶者是什麼人幸而其時諸方有人若遇如今狐狼野干之屬盲引衆盲見有百尺竿頭坐的便道你已死了須透祖師機緣方是死中得活便教人胡穿亂鑿今日透者一則明日透那一則若恁麼豈不見笑一時遺臭萬世討甚蓋天蓋地好龐老耶然而也是當人肯入作家爐韛肯求大手眼人鍛鍊始得你看龐居士見石頭問不與萬法為侶者是什麼人頭驀掩其口於此有個會處慚惶不少未到大休大歇田地到江西馬大師處仍舊問云不與萬法為侶者是什麼人馬大師踏向前一步云待汝一口吸𥁞西江水方與汝道龐居士到者裏方才命根子卒地折爆地斷放開窮肚皮海納百川七縱八橫千通萬達高步大方發一言令人不敢正耳聽著立一行令人不敢正眼視著師召衆云馬大師進那一步諸人還見到也未若也見到方可與山僧柱杖子相見若未見到豈可衲子不如他俗人有麼有麼驀竪柱杖云吸𥁞西江且止只如山僧柱杖子作麼生吞良久卓杖云劍為不平離寶匣藥因救病出金擲杖出堂十五夜小𠫵舉僧問趙州如何是祖師西來意州云前柏𣗳子師云報恩則不然有人問如何是祖師西來意但向道今夜一輪滿清光何處無小參師云山僧不指路頭一任諸人瞎闖諸人若也瞎闖得勇猛不顧危亡得失𥁞力闖將去驀然撞著峭壁巉巖磕破腦殼則一回知痛癢也未可知問諸人瞎闖則不問磕破腦殼時如何師云又慚惶又好笑問磕破腦殼則不問為甚又慚惶又好笑師云非汝境界小參舉眉州黃龍禪師僧問如何是密室龍曰斫不開曰如何是密室中人龍曰非男女相師云古人恁麼道山僧則不然如何是密室七通八達如何是密室中人長的長矮的矮且道與古人是同是別喝一喝卓柱杖一下仲春晚參師云古者道靈雲見處不在桃華上且道他見處作麼生衆無語師云正所謂如將名品果子殼也去了核也去了送人口邊人不解喫舉峰西堂秉拂師云昔日趙州云我在南方火爐邊有個無賔主話至今無人舉著噁直饒道閉門打睡接上上機也未若如斯提持今時人聞舉著向上一路末後牢關未嘗不商量浩浩地如說藥人真藥現前都不能識淵明云平疇交遠風良苗亦懷新東坡云非古之耦耕植杖者不能道非吾世農不知此語之妙吾於趙州亦云少間煩峰西堂對衆拈出晚參問答不録師云早間森首座領衆請法山僧道鐘動喫齊召衆云木包方外細徹毫端帆正晴湘𢖍開九靣出家兒造次顛沛不離衣鉢之側端能與露柱同披一領袈裟與山僧同一鉢盂烹饗也未此間一草一木同證圓明胡為有人自疑自別損法財滅功德莫不繇茲心意識誠哉是言也台山南岱宗北殊天異域之賔咸與山僧晨香暮燈共分寥寂胡為有人咫尺關山只為分明極翻令所得遲不大可哀乎昔日少林面壁二祖趨風寒立雪沒膝齊腰何等心骨鼻祖尚訶為輕心慢心徒勞無益斷臂安心出羣得髓瞻彼前修豈同裨販打一拂云精金百鍊自光瑩藥汞從教誇耀冶晚參問某甲閲楞嚴至七處徵心有個會處師云咄此非汝心作麼生會進云某甲無心師云咬人矢橛不是好狗問光陰如箭日月如梭如何了生脫死師云莫厚顏師乃云莫謂無心云是道無心猶隔一重關又有道說甚一重直是千重萬重既然如是畢竟如何明心見性良久云山僧昨在報恩示衆云古之天地日月猶今之天地日月天地日月無古今之異禪道佛法亦不應有古今之分為甚麼古之知識千百世之下凜凜常在人目前後之知識當世現在每淹淹如九泉下人古之學者一靣瞥地耀古輝今今之學者今日有些會處明日有些會處及乎生死到來依舊手忙腳亂蓋道無同異同異在人今之發心未嘗不如古人參究未嘗不如古人刻苦未嘗不如古人用心到無用心處亦未嘗不如古人但古人到無用心處决不望崖而退百尺竿頭更能進步所以道懸崖撒手自肯承當絶後再蘇欺君不得今人到千峰絶頂不惟不進步反退轉身來云吾已死而得活了以了不可得為究竟以擎拳竪指為透祖師關𥁞是懸崖縮腳種種自欺去他古人遠之遠矣卓拄杖云有志之士自知好惡晚參師云明道者多行道者少大小祖師話作兩橛明而不能行明的事向那裏去也諸人十二時中行的事作麼生良久云繞菴一水聲常住擁榻千峰勢欲翔早參師云古者道莫被天下老和尚舌頭瞞山僧道莫被天下善知識行履瞞祖師門下客須確實為生死口不嚼一粒米身不挂一縷𮈔方可隨意穿衣喫飯眼中不見一畫一竪耳中不聞一語一言方可隨時寫字看書否則大事未明如喪考妣大事已明如喪考妣如或生死心不切慎勿出家縱出家慎勿來宗門何以故目下雖未為生死儻不輕易出家不輕易來宗門尚知有出家事在尚知有宗門事在有等造次出家來此宗門隨羣逐隊發意做工夫如撞采的一般做幾時撞不著便一日悠忽一日一時怠惰一時自己既然將謂他人亦是如此謗大般若苦報無量有志之士務須確實晚參師云同居在此不論久參初學須各各退步到真實不欺之地晚參師云龍淵今冬與大衆約法三章第一飲水不得打濕口第二喫飯不得咬著米第三經行不得撞著露柱元旦知浴領檀越請小參師云大衆知麼汝等成佛以來已經無量阿僧祗劫舉足下足其地堅固金剛所成上妙寶輪以為嚴寶池瓊閣奇𣗳珍禽樂具充溢無有苦緣壽命無量光明無量法親無量如或未知則不矜久修不薄初學一念回光即同諸聖若也根思遲鈍便請一念不生去如或多知解多愚癡便請淨念相繼去但辦肯心决不相賺雖然如是且道善財入樓閣門為甚入已還閉所以道如來不出世祖師不西來汝等成佛已經無量阿僧祇劫晚參師云昨夜行者通大衆晚參山僧傳語云大好月你諸人作麼生會僧云砍却月中桂清光應更多師云矢上加尖衆久立師云山僧自領三十棒知浴古淵領海寧衆居士請解制紹興范居士求釋𠎝同請小參問答畢師揮拂云人人殊勝箇箇淨明似鳥行空而昧空如魚在水而忘水無瑕翳中自生瑕翳無障緣處自生障緣結空花於無明𣗳頭有何實果撈水月於昏沉海上徒見勞心既能物外逍遙必須真源頓達苟知空門皈向定應覺性洞明覺性明真源達方知罪垢本空而無罪不懺法道本超而無法不成大衆我不輕於汝等汝等皆當作佛下座小參師云昨日大衆晚參山僧道洗清昔日擔泉處斫出當年靣壁巖汝諸大衆各各領悟也否聞斯提舉若能正眼洞開則忙閒動靜一語一默著著有出身之路用得十二時不為十二時用轉得一切物不為一切物轉攪長河為酥酪變大地作黃金供養大衆不為分外如或不然二時粥飯咬須彌山子唇齒之間太費支持七尺形骸挂冰稜鐵甲俯仰之際大有不便卓柱杖結夏檀越請小參師云圓陀陀光爍爍淨裸裸赤灑灑三頭六臂千手千眼而本無一物純真一如無臭無聲而萬象縱橫閉門打坐遍界不藏閙市橫身孤巍嚴密諸作紛紜而非動一物不為而非寂違之者自暴求之者愈失千賢萬聖趨向無門千佛萬祖退身有分師以拂子打一下云誰參勝熱婆羅門六月霜花凝枕席下座晚參師云去聖時遙言高志下欲明格外旨須𥁞域中情顧左右云大衆看腳下晚參師云劫火洞然大千俱壞未審者箇壞不壞壞恁麼則隨他去也隨他去大隨恁麼答話有甚長處投子望山禮拜衆無語師云古之學者為己以竹篦拍香案便歸寢室晚參師云祖師時時在水桶上出現剛見人挑水走入水桶裏去也祖師時時在火焰上出現剛見人燒火走入火焰裏去也祖師時時在木魚上出現剛見人打木魚走入木魚裏去也祖師時時在鐘鼓上出現剛見人打鐘鼓走入鐘鼓裏去也良久云有人出來道和尚何得壓良為賤山僧只要你恁麼道小參師云理無事外之理事無理外之事理外之事則愚事外之理則狂狂則為魔所攝愚則為佛所悲寧為佛悲莫為魔攝大衆來此祖必須立深誓願正知正見正路修行庶幾同證圓滿菩提晚參師云昔年大慧禪師因一禪子參公案不透乞求方便慧云你是福建人我為汝說箇譬喻如將名品荔枝皮也去了核也去了送在汝口邊只是汝不解喫師召衆云當初大慧為此一人設個譬喻此人當下咬破舌頭山僧因衆參上𣗳公案重重相為云緊夾籓籬寬闢道如何衆中未見有腳頭點地的乃云但辦肯心必不相賺更與汝等一個安心丸子三文大光錢買得個油餈喫向肚裏了當下便不饑晚參師顧左右云今日晚參不許問話不問話者三十棒衆擬議師云自從立雪人歸後幾片白雲護翠岑結制古淵知浴領海寧衆檀越請小參問爐韝大開不留鈍鐵金鎚揮擲萬竅通明還許學人立地成佛也無師云進前來喫棒進云與麼則滾入紅爐大冶中直得通身無縫𦉑師云許汝膽大問得祖宗之髓登祖宗之堂敢問和尚昔日僧問臨濟如何是奪人不奪境濟云煦日發生鋪地錦嬰兒垂髮白如𮈔為甚本山中祖道錯師云一對無孔鐵鎚進云與麼則二大老料揀一齊蒙和尚指示去也師云與汝六十棒問如何是法王正令師云千鈞之弩進云與麼則人人沾恩個個得力師云已放過居士問不侶萬法不取凡聖事如何師云佛子受佛戒即入諸佛位師乃云天目山下無寸土天目山頭無片雲腳跟跐著寸土有寒暑兮促君壽有鬼神兮妒君福眼中見有片雲風力所轉終成敗壞且道住此天目山如何行履即得虗空拍手呵呵笑報汝人人淨法身聞斯告報直下承當如來禪許汝會更須知有祖師禪始得且道如何是祖師禪驀喝一喝隨聲以竹篦撫案一下晚參師云祖師示現全身向汝諸人毛孔中念普字真言汝等𥁞見𥁞聞麼一僧喝師云胡喝亂喝乃云分明指出平川路却奈忠言逆耳何除夕晚參師拈柱杖召衆云識得柱杖子麼一日不為少千載不成多小則蟭螟眼裏橫眠大則乾坤西傾東闕出息不隨衆緣入息不居陰界試看先宗是何標格你有柱杖子與你柱杖子你無柱杖子奪你柱杖子晚參師召大衆云莫瞌睡石晚參師以杖指一碎石云者石版如何沒一些縫良久又指一完石云者石版若為有許多縫一僧云謝師指示師便打乃云今時學者有兩種錯路一種錯路的問著便道喚什麼作燈籠一種錯路的問著便道露柱沒一點縫是者兩般錯路便掩蔽却人人本地風光若不踏著本地風光終不能免此兩種錯路今日不惜眉毛說似諸人竪柱杖云山僧柱杖子有九千九百九十九隻眼顧視左右云更有一隻不與你們說𥁞何故若教容易得便作等閒看晚參師云吾觀大衆𥁞與佛祖無二無別但存人我自生間隔所以祖師示衆誦金剛般若經上根者一聞千悟後來祖師教人參死了燒了話父母未生前話便是將一卷般若經括作一句教人持念汝諸大衆須在佛祖路上行方到佛祖田地若四相未空徒勞無益各宜珍重晚參師云山僧說得一篇佛法懸在雨華橋上大衆各去看取良久云伯樂曾三顧千金誰解增贈君君不納完壁倚枯藤晚參舉傅大士道空手把鋤頭步行騎水牛人從橋上過橋流水不流師云天目則不然生鐵打鋤頭披簑收水牛人從橋上過水流橋不流且道傅大士的是山僧的是良久云朝參暮請緣何事應須立透