既欲明宗旨且莫當靣蹉過莫拈一放一好教你知報恩者裏即兩堂課誦便有玄有要有權有實有照有用某上座有時一聲佛如金剛王寶劍有時一聲佛如踞地獅子有時一聲佛如探竿影草有時一聲佛不作一聲佛用亦有殺亦有活亦有縱亦有奪亦有主亦有賔亦如清凉池亦如大火聚背之則受諸苦惱觸之則燒却靣門饒人左之右之時進時退或邪或正或是或非或行解相應不相應或見地透脫不透脫不消別施勘驗只者兩堂課誦都料簡詳悉也凡在報恩者切莫以課誦出坡等為虛應故事須知無不是佛祖之祕密法無不是佛祖之總持門無不是佛祖之不傳心要無不是佛祖之自利利人捷徑若道別有宗旨別有佛法別有好知解更欲假借古德念佛漱口之說以圖避懶妄擬議人則先謗他古德為不要人念佛又以報恩念佛作念佛會則真可憐生你若果是箇人能各出手眼別樣設施為人去某上座自識得你不要你類我若你等道必要恁麼我又不恁麼也祗如我恁麼事無不具玄要權實照用主賔縱奪你作麼生會敢妄擬議耶凡為魔所攝毒氣深入者一任你別去學佛法學宗旨多生分別異樣揀擇他日眼開自知負墮如我同志真實學道者切須立定腳跟努力行持莫為魔惑其或獅子蟲定不輕縱以亂清規羯磨夜示衆師云毀犯者墮諸苦趣執持者報在人天且道既不毀犯又不執持的當生何處良久云自是不歸歸便得故園風月有誰爭便歸方丈示衆舉僧問慈明閙中取靜時如何明曰頭枕布袋師云山僧若在座下管教先南源不只恁麼休去何不進云和尚莫世諦流布且道先南源又且如何示衆師云汝等諸人須信本來是佛各須識取本來面目踏著本地風光若識得本來面目黃金世界白玉為身栴檀叢林栴檀圍繞不然草木叢林時時凋喪衆禮拜示衆舉佛眼禪師上堂云世人𥁞道路行難本分真金入火看煉去煉來金體淨一槌打作玉欄杆師云古德恁麼道應有聞之踴躍者應有聞之竦惕者示衆舉淨覺本禪師僧問同聲相應時如何淨云鵓鳩𣗳上啼師云可惜者僧浪問不知落處見淨老云鵓鳩𣗳上啼何不遙空掌云打落枝頭時如何儻淨老再云作家禪客天然有在何不進云某甲點茶來請和尚儻淨老再云果然作家便禮拜而出豈不話不虛行雖然鵓鳩𣗳上啼汝諸大衆作麼生會死關千丈巖回示衆云者一百二十日老僧日日在兩序諸公肚裏走三轉諸公知麼衆進語畢師又云者一百二十日老僧日日在各堂寮苦行諸禪肚裏走三轉諸禪知麼衆進語畢師又云者一百二十日老僧日日在內外大衆肚裏走三轉大衆知麼衆久立師左右顧視下座示衆師云透脫末後牢關雲菴所罵洞達歷祖綱宗妙喜猶呵汝等諸人趣向者個法門大須仔細前溪水急魚行澀後嶺風高鳥泊難示衆舉道吾禪師每執木劍作舞僧問手中劍甚處得來吾遂擲於地僧取置吾手中吾云甚處得來僧無對吾云容汝三日下取一轉語僧亦無對吾乃橫劍肩上作舞云恁麼始得師拈云吠虛逐塊韓盧咬著半醒半醉漢子終不免大家草裏輥道吾若於者僧才欲取劍便一腳踏翻儻其知非不惟令彼頓易皮毛自亦頭正尾正那堪不示本分草料木劍竟成戲具示衆舉雲門道直得觸目無滯達得名身句身一切法空山河大地是名名亦不可得喚作三昧性海俱備猶是無風匝匝之波直得亡知於覺覺即佛性矣喚作無事人更須知有向上一竅在大慧禪師云潑油救火渾閒事雪上加霜愁殺人師云智者見之謂之智仁者見之謂之仁住吳興報恩示衆舉密菴禪師上堂舉婆子燒菴話云者個公案叢林中少有拈提者傑上座裂破靣皮不免納敗一上也要諸方簡點乃召大衆云者婆子洞房穩密水泄不通偏向枯木上糝華寒巖中發焰個僧孤孤迥迥慣入洪波等閒坐斷潑天潮到底身無涓滴水仔細簡點將來敲枷打鎖則不無二人若是佛法未夢見在烏臼與麼提持意歸何處良久云一把柳𮈔收不得和煙搭在玉闌干師云風流婆子本分衲僧一個高高山頂立一個深深海底行被密菴禪師路見不平把來束作一團擲在糞掃堆頭一場狼藉雖然密禪師也該喫三十苕帚柄何故他家各有通霄路那可鼓是生非尊己慢人乃呵呵大笑云三足香爐一腳踢翻了還有扶起者麼設若有人出手但輕輕與他道死貓頭那許你正眼覷著示衆舉陸亘大夫問南泉云肇法師也甚奇怪解道天地與我同根萬物與我一體泉指前牡丹花云大夫時人見此一株花如夢相似師云田地廓徹許他大夫觸事知歸須還王老然而也要招人簡點何故兩個老作家𥁞在座主網裏𨁝跳在若是出格錦鱗必不看窠守窟天但言天地但言地我但言我萬物但言萬物與時人逐色隨聲何容有異偏與麼談根論體寐語轉深設有弗甘的云恁麼說話不見超羣但向他道有理不在高聲示衆舉法眼禪師問僧甚處來曰泗州禮拜大聖來眼曰今年大聖出塔否曰出眼卻問旁僧曰汝道伊到泗州不到浮山遠云者僧到即到泗州只是不見大聖道場全云者僧見即見大聖不曾識法眼東禪觀云者僧到也到泗州見也見大聖識也識法眼秪是自討頭不見師云者一隊老禿奴病在膏肓只顧道那僧不見誰知卻是自不識那僧有人出來道和尚恁麼道也是扶弱不扶彊新報恩隨聲便打且道是肯他是不肯他示衆舉金峯和尚云老僧二十年前有老婆心二十年後無老婆心僧問如何是二十年前有老婆心峯云問凡答凡問聖答聖曰如何是二十年後無老婆心峯云問凡不答凡問聖不答聖師云個老漢全提正令獨握綱宗左右逢源前後無暌可謂得向上鉗錘不落時人窠窟然簡點將來也是自起自倒示衆舉翠巖真禪師上堂云臨陳抗敵不懼生死者將軍之勇也入山不懼虎兕者獵人之勇也入水不懼蛟龍者漁人之勇也作麼生是衲僧之勇拈柱杖曰者個是柱杖子拈得把得動得三千大千世界一時搖動若拈不得把不得動不得文殊自文殊解脫自解脫𭆤師云翠巖老人恁麼舉揚雖然竭力提撕未免傷神費氣新報恩則不然坐致太平者仁主之大勇也道高虎繞德重龍馴者至人之大勇也袖手憑几云衲僧之大勇又作麼生竹戶松龕濃睡穩花開花落聽東風從他伎倆有時𥁞我此平懷何所窮若更有多才能思逞英豪的一任𨁝跳示衆舉曹山行腳到烏石山靈觀禪師處問如何是毗盧師法身主觀曰我若向汝道即別有也曹山舉似洞山山曰好個話頭秪缺進語何不問為什麼不道曹又去進前語觀曰若言我道即啞卻我口若言我不道即蹇卻我舌曹山歸舉似洞山山深肯之師云觀老與麼答話好則好矣然而也是君子善知識若待曹山再來云為什麼不道便打落渠嘴非惟洞山聞之不敢正視亦使曹山脫落見聞不只個般傳言送語示衆舉大慧杲禪師歲旦上堂去年今日也只是者個前年今日也只是者個先前年今日也只是者個外前年今日也只是者個明年今日也只是者個後年今日也只是者個外後年今日也只是者個更後年今日也只是者個且道者個是甚麼元旦啓祚萬物咸新應時納祐慶無不宜喝一喝云俗氣不除師云作賊心虛示衆舉僧問睦州如何是展演之言州云量才補職如何是不展演之言州云伏惟尚饗大慧禪師云睦州古佛善應來機雖然如是只得八成或有人問徑山如何是展演之言即向他道問十答百有甚麼難如何是不展演之言喝一喝云且莫矢窖沸師云大慧老人土上加泥直饒道得十成是猶五十步而笑百步也若有問新報恩如何是展演之言不說一字如何是不展演之言其聲如雷起不臥七示衆師拈柱杖云古者道大事未明如喪考妣大事已明如喪考妣你看大事已明尚是如喪考妣况大事未明者乎所以云𭆞須實𭆞悟須實悟直須廢寢忘餐向一念未生前識取自己廣大心體豈容魔外家亂承當個昭昭靈靈識神為主人公大事未明如喪考妣人共曉得你道大事已明為甚亦如喪考妣若透過者關方見過佛祖可與佛祖為師如或不然直饒大徹大悟如雲開月朗夜暗燈明識自本心見自本性未免見齊佛祖减他佛祖半德悟境不忘礙正知見如雪巖高峯等於白日空閒廓忘知見之處中夜睡著泯無夢想之時依舊打作兩橛剗地又透不過既透不過生死岸頭便是樣子所以從上來目為向上一路末後牢關到者裏豈許魔外家謬扯虛空粉碎大地平沉初悟境界來扭捏顧左右云山僧恁麼舉揚合喫三十柱杖今日倒行此令去也以柱杖旋風打散解制示衆師云端居一室含裹十虛諸人若向含裹十虛處會得不妨一室端居若向端居一室處透脫本來十虛含裹恁麼則何長期短期復何結制解制所以道住也如孤鶴冷翹松頂行也似片雲忽過人間要行便行佛祖不能知要住便住鬼神不能覷現前大衆百二十日聚首還曾夢見山僧也未未論見山僧與否還各各識得自己麼咄出頭天外看誰是個中人住古杭良渚大雄山示衆舉世尊才生下一手指天一手指地周行七步目顧四方云天上天下惟我獨尊雲門偃云我當時若見一棒打殺與狗子喫貴圖天下太平雪竇顯云便與掀倒禪牀琅琊覺云雲門可謂將此深心奉塵剎是則名為報佛恩天童華云雲門此話雖行未免落他陷穽黃靣老子末上賣俏正是依草附木二俱不了以左手拍禪床云過者邊著汝諸人還知明果落處麼珊瑚枕上兩行淚半是思君半恨君師云激揚酬唱須是其人高山流水老釋迦何期得知音於異世雲門如百轉靈丹若非雪竇琅琊誰能著價然而一椎百當須還應菴好手古人評書云如華嶽三峯卓立參昴雖造化之爐錘不自知其妙也此言雖俗可以喻道示衆舉唐朝因禪師運椎擊土次見一大塊猛擊之應椎而碎豁然大悟有老宿聞云𥁞山河大地被因禪師一擊百雜碎應菴華禪師上堂舉云老宿恁麼道縱知因禪師落處銜鐵負鞍有日在者裏著得眼去也是徐六擔板師呵呵大笑云直是好笑笑須三十年若人云更有一個好笑的在也許是個知音欲重宣此義而說偈曰冰雪峯前吐白蓮胡僧作梵禮金仙德雲別嶺殷勤和笑破百泉鼻半邊示衆舉石室見僧來拈起柱杖云過去諸佛也恁麼現在諸佛也恁麼未來諸佛也恁麼長沙云放下柱杖子別通個消息來圓悟禪師云石室置個問端不妨孤峻若非長沙爭得投機雖然只知恁麼不知不恁麼遂舉柱杖云過去諸佛不恁麼現在諸佛不恁麼未來諸佛不恁麼或若總道放下柱杖子我也知你只是學語之流生機處道將一句來師云一個綿包特石一個鐵裹泥丸放行則在廟之圭璋把住乃處堂之燕雀拈柱杖云恁麼也不是不恁麼也不是放下也不是不放下也不是卓柱杖云倚天長劍逼人寒是山僧尋常用處有能向者裏如龍得水似虎逢山便乃分付柱杖子示衆舉傅大士云終日焚香擇火不知身是道場玄沙和尚云終日焚香擇火不知真個道場圓悟禪師云終日焚香擇火不知焚香擇火龍池幻祖云老僧年來無事一味焚香擇火師云昔人問客𮈔不如竹竹不如肉客云漸近自然知言哉似則似鄉人有言曰千語千當不如一默示衆師云諸方說些佛法消施主茶謂之茶話古時亦有家風冷淡的或說小𭆞作供大雄者裏一總不然尋常喫了粥飯便與諸人說些佛法乃云挑磚的挑磚盤瓦的盤瓦示衆師云古人親承記莂後或十年二十年不離左右深恐離師太早未𥁞其妙即索居別處者皆茅茨石室大忘人世天子不得而臣君相不得而友或形影相弔或混俗和光或八請不赴或終身死關非種種成就及迫於萬不得已安肯輕為人師哉山僧因梁木其頺勉以雞肋之力支持大廈之危深自愧悔凡吾付授諸子非托主持本寺或克本院頭首不倦不厭自利利人儻馳情利養注懷名位學短販自鬻者聚集數十不如己人誑惑愚瞽南面自尊妄稱長老小𭆞示衆如同兒戲甚至濫交褻己惟圖門熱閙種種不遵山僧常住規約者定行追拂嚴𢷤遠近咸知示衆舉先報恩老和尚示衆云今朝四月半農家秧好看堪笑懶禪和一事無可斷開了兩片皮只是粥飯罐道眼不能明閻羅要打算師云先師與麼道堪與人天為師若要與佛祖為師須某上座共出隻手始得看看七月半田家稻好看笑我懶禪和一事無可斷開了兩片皮只是粥飯罐道眼不能明說甚閻羅漢示衆舉有僧持鉢至長者家偶為犬傷長者因問龍披一縷金翅不吞大師全披法服為甚卻被狗咬禹門幻翁禪師代云如長者者問無差師拈柱杖云師翁此一轉語非荊𣗥林中橫身直度逆行順行天不能知神不能測鑊湯爐炭中成等正覺刀山劍𣗳上轉大法輪者未許如水合水似空合空在卓柱杖下座示衆舉南泉至莊莊主預偹迎奉師云法會因緣第一泉云老僧居常出入不與他知何夙排辦至於如是師云放過不可主云昨夜土地神報師云布袋盛錐泉云王老師修行無力被鬼神覷見師云無智人前莫說侍者便問既是大善知識為甚却被鬼神覻見師云韓盧逐塊泉云土地前更下一分飯著師云獅子搏兒不露爪落堂示衆師云古人道立地搆去坐地搆去大衆𭆤究多日還搆得麼僧禮拜云搆個甚麼師便打僧擬議師云似即似是即不是問僧你為甚不扛木子進云某甲今日扛的師云扛木子的站過一邊一僧笑師拈棒云你見甚道理笑僧禮拜師連打兩棒云一棒打你笑一棒打你拜問僧喫得棒未僧擬議師打云眼睛頭事也照管不來問僧向父母未生前道來僧擬議師便打師卓柱杖云大家莫作等閒看擲杖歸方丈結夏晚落堂示衆師拈柱杖云千尺寒潭拋直鉤清風白月照𮈔浮有時得意歌聲發笑見魚龍一網收顧左右云炎炎六月一團冰今夏教衆兄弟一個個凍得骨出卓柱杖云切忌動著動著則三十柱杖便乃定單而出示衆師云一椎便就時如何未是性燥漢不假一椎時如何不快漆桶汝衆人還用打三不用打三衆無對師良久云誰人知此意令我憶南泉先磬山八十大誕影堂示衆師云昨夜夢見先老爺作大力善知識輕輕一彈指直教𥁞大地情與無情一時百雜碎汝等諸人作麼生禮拜供養嶽都寺云應如是供養一僧云恩大難酬師乃云何不道恁麼則與先老爺一箇鼻孔出氣去也衆作禮退陸山示衆大衆跪求開示師云汝等既爾殷勤啓請應當日日如見我時聽說偈言惟石有玉惟泉有珠得之則智舍之則迷潤山輝淵念茲在茲示衆舉百丈野狐公案暨黃檗溈山問答機緣師自頌云畫虎成狸竹成柳龍睛點出拿雲走舉一明三有好兒當場齊作師子吼有智主人俱不受大冶精金誰解剖嘗聞一喝三日聾盧公擊破唾壺口示畢召衆云一一識得古人落處麼識得百丈易要識黃檗難識得黃檗易要識溈山難若識得溈山便識得黃檗識得黃檗便識得百丈祗如溈山三撼其門大衆作麼生會良久師自代云識法者懼師落堂坐香示衆云坐香不許參禪參禪者三十棒坐香畢大衆作禮師云適來虛空撲落地諸人還聞得刮剌剌一聲響麼僧作禮師云且道兩京十三省磕破多少禪和子額角衆佇立無語師云參禪底也三十棒瞌睡底也三十棒以柱杖左右打散出堂示衆師云汝等到者裏須踏著本地風光莫為幻妄身心所惑還知各各身子秪得百年受用麼若不踏著本地風光百年後渾無著落示衆舉雲門云𥁞十方世界乾坤大地以柱杖一畫百雜碎三乘十二分教達磨西來放過即不可若不放過不消一喝師云用許多氣力作麼示衆師云諸賢同居天目不忘開山六問甚善甚善新天目當為開山作主先透新天目關方許過開山關第一問上座大徹未第二問上座于佛祖公案幾則明幾則不明第三問上座是大修行人否上座守毗尼否第四問片雲遮日不遮日第五問踏著影子踏不著第六問如何𥁞大地是火坑山川人物作麼生晚參罷示衆師云不負溈山不說破打鳳屠龍羅網大若人𢬵得學癡呆力𥁞和衣橫寶座橫寶座風轉摶空八角磨𭆞時舉上𣗳話示衆師云時當晚末邪法難扶盲引衆盲相牽淪墜實心學道久住叢林者應知好惡師子咬人韓盧逐塊南泉斬猫作麼生會衆久立師云識法者懼示衆舉真淨上堂摩尼珠人不識如來藏裏親收得既收得不護惜也要衆人見驀拈柱杖擲下云還識麼若識燒沉水香供養諸禪德明月照見夜行人良繇不是他家事𠫵師云大小雲菴向小兒前拍喔喔師又云透過百丈三句須是者尊宿示衆舉天真上堂道火被火燒道水被水溺會禪被禪縛以手指左右云却被者僧勘破師云真老與麼施展天然作家雖然如是未免手忙腳亂示衆舉唐州大乘遵禪師上堂云上來又不問下去又不疑不知是不是是即也大奇師云其時無量大衆一時成道冬節示衆師拈柱杖云祖師關欲透難行努力行吾今明指示冬至一陽生卓杖休去示衆舉法華舉禪師示衆云夫第一義諦非智辨所詮非心機所測教外別傳不立文字既到者裏復且如何直須坐斷毗盧不存凡聖還能如是麼若也未能山僧重說偈言去也不結毗盧印那弘古佛心明月照幽谷寒濤助夜砧諸人委悉麼各希發問衆問話畢舉乃云夫𠫵學須具擇法眼不得顢頇若得正眼精明一切無滯不見古人道一句語中須具三玄一玄中須具三要古人恁麼道意在於何鵝王擇乳素非鴨類師云此古德第二門頭垂手試看何等意句俱到音釋屩吉嶽切音覺草履也翥陟慮切音注飛舉也鼷弦雞切音奚小鼠也騅朱惟切音追馬也陷穽上平鏗切咸去聲下疾正切音淨坑坎也鬻余六切音欲賣也
