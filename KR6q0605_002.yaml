body:
  text: 嗣法門人行嶽編上堂二閏正月旦上堂師拈柱杖云一不成隻兩不成雙今朝正是奇特月日還有奇特人出來共明奇特事麼問答畢師乃云茲者好日多同化主自遠歸來施主入山設供山僧也趁閙熱供養大衆一上幸諸大衆各各現大人相赴山僧齊山僧將無邊世界一切地土為米一切河海為湯一切森羅萬象為奇肴美饌一任大衆放開肚皮展開大口飲之不竭食之有餘飽地乘風徐行片時遊遍諸佛國土向虛空裏打箇翻筋斗下來山僧再呈第二番供養把無邊世界依舊撒開以一世界為一齊一任大衆樂一味者即向一味世界應供樂多味者即向多味世界應供隨大衆種種所樂即向種種世界應供齊畢旋歸然後山僧將無邊世界仍前還他無邊世界一切地土仍前還他地土一切河海仍前還他河海米還是米湯還是湯肴還是肴饌還是饌殷勤請山僧升座畢然後落堂喫齊令諸檀信求福者福集懺罪者罪滅薦亡者亡人高升生安死利靡不如意顧左右云且慢散去三番供養大衆了更要總散大衆一大分䞋錢乃舉百丈上堂云我有一句子百味具足大衆還會麼慈悲之故而有落草之談下座新市覺海寺緇白道侶請上堂問請和尚直指西來意師云久雨今日晴問弟子年老求和尚開示師竪柱杖進云不會師云高著眼師乃云天地成人物立有美有惡有是有非有邪有正有曲有直有宜有不宜有可有不可從而分別指畫去取戒勉令修令治使知使行扶持世道匡正人心此儒教治世之理也談無破有推小至大求精棄粗輕外重內此道教出世之道也道有也而不立一塵道無也而不撥一物有時恁麼有時不恁麼有時恁麼也得不恁麼也得有時恁麼也不得不恁麼也不得有權有實有照有用有縱有奪有殺有活可以意會難以言傳承言者喪滯句者迷此釋教入世出世之法也方便指迷之謂教直下傳心之謂宗漸者繇博而至約頓者一了而百通把住黃金失色放行瓦礫增輝且道把住為人好放行為人好卓柱杖云人歸大國方知貴水到瀟湘一樣清上堂師拈柱杖云自慚少福住幽林淡薄辛勤歲月深散衆欲眠峯頂石捐身助道是何心仔細看來竭誠為衆的也有肯心檀護也有只要我輩顓精學道古德云學道如鑽火逢煙未可休直待金星現歸家始到頭又有云歸家盡是兒孫事祖父從來不出門你看先聖與麼激揚可知學道非同小可若不一聞千悟直須一切放下忘苦忘樂忘死忘生歷盡艱難方能透脫顧左右云有踏著上頭關的出來通個消息師乃云世出世法非憑一點真心不能成就故有此真心也可以自利有此真心也可以利人有此真心也可以自利而利人有此真心也可以利人而自利徹此心源便見瑞林面目清勝化儀目在報體淨滿金方伯與潯溪衆信凡受瑞林所化生一念淨信所作佛事皆成佛道驀卓柱杖下座上堂舉五祖演和尚云四五百石麥二三千石稻好個休糧方耆婆不得妙千巖長禪師云管取有錢常住不無演祖若是將無作有貧作富須還無明始得米不蓄一粒菜不栽一莖任渠來往者喫得飽彭亨師召衆云用四五百石麥二三千石稻如何喚作休糧方米不蓄一粒菜不栽一莖如何喫得飽彭亨阿呵呵大海納流寒巖發𦦨二大老不無些小巧妙簡點將來未見大人體態報恩者裏則是直心道場不用蛇足有米喫三餐無米喫兩度也有時恰好也有時忍餓擲拂子下座瑞安禪人請上堂師拈杖云過去已過去未來猶未來佛法付在報恩明眼禪流出衆相見問答不録師卓柱杖云一棒分賔主照用一時行會得個中意日午打三更且道會得個中意如何日午打三更擲柱杖云不是苦心人不知下座檀越請上堂衆僧問話畢師乃云深固幽遠無人能到大家在者裏其中事合知青蘿夤緣直上寒松之頂白雲淡濘出沒太虛之中隨緣灑落者皆已成佛道百千法門同歸方寸河沙功德總屬心源一念純真者皆已成佛道實際理地不受一塵佛事門頭不捨一法勤勤懇懇力行衆行者皆已成佛道終日著衣不挂一縷𮈔終日喫飯不咬一粒米孤迥峭巍者皆已成佛道逢茶喫茶逢飯喫飯和泥合水者皆已成佛道事事無礙七縱八橫者皆已成佛道矜矜自守重因果罪福者皆已成佛道驚羣動衆激揚酬唱者皆已成佛道入林不動草入水不動波者皆已成佛道擊香案云但願春風齊著力一時吹入此中來驀卓柱杖喝一喝下座佛誕上堂問報恩門下如何設施師云菖蒲溪水西流碧師乃云第一義如何舉梁王殿上道不識老達磨也只道得一半者一半報恩為衆竭力驀拈香云今辰是我始祖釋迦文佛降誕之期遠孫通琇敬拈片香用酬法乳下座檀越請上堂上首白椎云法筵龍象衆當觀第一義師拈柱杖云道個第一早落第二了也然而屈曲垂慈不妨左之右之靈利衲僧出來酬唱問話畢師卓柱杖云大解脫門同證同入僧俗長幼男女貴賤富貧智愚靡不俱在個裏平等一味設齊也在個裏喫齊也在個裏修福也在個裏修慧也在個裏求壽也在個裏求貴也在個裏一一殊勝一一圓滿一一不退一一無漏寒巖枯木華如錦六月炎炎滿市霜連卓柱杖下座結制了悟禪人率湖城衆居士請上堂師拈香云此瓣香從大衆實地中拈出爇向爐中伏冀法界普熏四恩總報斂衣就座白椎竟問祖上門即不問重整家風事若何師云一條白棒驗龍蛇進云正令當行不存軌則更借一問時如何師云要第二杓惡水那進云千古模範從今立萬派青山展笑顏師云為衆竭力師乃云山僧質直無文從來如實為衆以𥁞虛空遍法界為清淨伽藍令無邊國土情與無情平等安居無內無外何逸何勞喝一喝云普利羣機一句作麼生道薰風自南來殿閣生微凉癸未誕日檀越請上堂師至座前滌凡劉居士同凉禪等呈祖衣師云兩年福薄勉為人糠麥為糜草作羹時節漸佳慚未輟此衣珍重至誠心便搭衣顧左右云先聖有言此衣表法舉衣云者個是衣喚什麼作法復舉衣云者個是法喚什麼作衣向者裏千眼頓開何事不辦如或未然更為當陽揭露升座白椎竟問如來和尚同月同年如何是無量壽師云山僧今年三十師乃云圓陀陀七華八裂錦攢攢絶點純清明中有暗黃金失色暗中有明瓦礫生光擬議承當白雲萬里愁眉退避凉飈滿自取不得捨不得事是恁麼事人須恁麼人得在此失在此但得恁麼人何愁恁麼事且超羣越格一句作麼生道良久云普下座九月姚均仁居士請上堂師云見離斷常道無明昧斷常之見非真見明昧在人不在道直饒戴角擎頭未是當家種草一種平懷悠然自得的衲僧出來道個應時及節的句看問如何是無生話師云池無擎雨緑有傲霜黃問應供一句如何道師云端坐受施主樂師乃云金華布地玉蕊承天今正是時杲日當空乾坤朗耀古今無異闍𥠖老僧靣目現在悟人瞎人誠諦之言一句明明該萬象籬邊斜插驗人枝驀喝一喝下座上堂師卓柱杖云彩雲影裏仙人現手把紅羅扇遮靣急須著眼看仙人莫看仙人手中扇具眼衲僧出衆相見問話畢師乃云大凡𠫵學之士直須絶情絶解親證親悟句一念不生前透脫本地風光方可任運穿衣喫飯健則行道倦則打眠青青翠竹總是真如鬱鬱黃華無非般若於古人言句自然舉一明三通此達彼邇來逐塊外道妄認搖唇鼓舌舉足動步的識神為主人公為本來靣目自不知非更引佛祖相似言句謬解妄會欺愚瞞瞽所冀真實為生死者力參涅槃堂裏禪於臘月三十關頭不可自誤豈肯為邪外所惑復卓杖云不是與人難共合大都緇素要分明解制上堂師左右顧視云山僧與諸大衆恆處普光三昧直是如天普蓋似地普擎住者朕跡不留去者回避無計恆沙國土情與無情同一受用同一自在同一解脫在迷不減在悟無增數千年前有多口阿師命之曰大圓覺場曰真如性海種種彊為名目無非當人有恁麼事故為當人說恁麼話如是知者名為正知如是行者名為正行有何長期短期復何結制解制然而某上座有時現無邊身說無邊身法有時現七尺比丘身說七尺比丘身法有時與大衆遊大寂滅海上無佛祖下無衆生中無自己正報既爾依報亦然有時隨順衆生七顛八倒向無修學中說修學無迷悟中說迷悟便乃無制無期中立期立制無解無結中立解立結結也高挂鉢囊解也緊峭草屩結也如是解也如是阿呵呵好大哥大抵還他肌骨好風流不在著衣多檀越請上堂僧擬出問師左右卓柱杖云知恩報恩的衲僧方許相見進云祖道凌夷法門衰替如何是和尚拯一𮈔九鼎之危的句師和聲打一柱杖進云恁麼則三玄開正道一句破邪宗也師云向上道將來僧喝師連喝兩喝問當機一句是如何師卓杖云一棒一條痕一掌一握血師乃云昔日世尊有四弘誓願衆生無邊誓願度煩惱無𥁞誓願斷法門無量誓願學佛道無上誓願成白雲端和尚有四弘誓願饑來要喫飯寒來要添衣困來伸腳睡熱處要風吹山僧也有四弘誓願識得柱杖子許他有喫棒分識不得柱杖子許他有喫棒分識得不識許他有喫棒分不識識得許他有喫棒分高擎柱杖云看看𥁞山河大地明暗色空并汝等諸人周身上下毛孔骨節𥁞成山僧柱杖子諸人還知麼卓柱杖云知得也三十柱杖知不得也三十柱杖且道柱杖子因甚麼有如是威力蕩蕩一條官驛路晨昏曾不禁人行下座開爐上堂師拈柱杖云一椎便就未是性燥不假一椎漆桶不快入得從上爐鞴的衲僧出衆相見一僧出禮拜師云欲釣鯨鯢澄巨浸却嗟蛙步𩥇泥沙僧擬議師打出又僧出師震威一喝僧擬議師亦打出又僧出師云當場相見須是作家僧喝師云胡喝亂喝作麼僧又喝師又打出師乃卓柱杖云莫道法王得自在緇素不得不分明擲柱杖下座臘八上堂師云從門入者不是家珍過量衲僧出衆相見問世尊睹星悟道悟個甚麼師云好狗不咬枯骨進云四十九年說法說個甚麼師云誑謔愚瞽進云拈華示衆示個甚麼師云轉見不堪師乃高聲召衆云大衆能仁是汝之奴下座大雪檀越請上堂師拈柱杖云第一句薦得鶴有九臯難翥翼馬無千里謾追風第二句薦得左右逢源珠回玉轉第三句薦得眼睛烏豆換鼻孔草繩穿秪如昨日慕津居士率衆信士請山僧上堂山僧高聲應云今日好大雪諸人作麼生薦取問金車千古重覿靣勢崔巍箭鋒相拄者誰不犯鋒鋩師云千鈞之弩不為鼷鼠發機進云恁麼則大地終成白業千溪萬派同源師云請過一邊慕津居士問如何是諸佛出身處師云天寒人事簡雪重鼓聲盈師乃舉龐道玄居士至藥山山命十禪客相送至門首士乃指空中雪曰好雪片片不落別處有全禪客曰落在甚處士遂與一掌全曰也不得草草士曰恁麼稱禪客閻羅老子未放汝在全曰居士作麼生士又掌曰眼見如盲口說如啞師云老大龐居士暴富欺貧全禪客當斷不斷反招其亂若是龐老向山僧道好雪片片不落別處便劈靣與他一拳云俗氣不除當時龐居士若喫得者一拳管教安家樂業更不播弄唇皮下座大雪設禹門幻有老和尚供師云師翁靣目雪滿千山先師儀表春回大地先師春回大地也雪滿千山非當年久侍者不知師翁雪滿千山也春回大地三十年後有人共見今日某孫應時獻一杯茗罪過彌天何故不合當面觸犯解制空明師同滌凡劉檀越請上堂問答畢師乃云𥁞大地是解脫門把手牽不入𥁞大地是涅槃路倩人行不得入得解脫門行得涅槃路便乃動若行雲止猶谷神既無心於彼此豈有象於去來南贍部洲坐禪北鬱單越腳麻東弗于逮持鉢西瞿耶尼手酸大洋海底翻身打倒兜率天宮觸著閻羅老子鼻孔帶纍四大天王齊聲噴嚏天人捧華無路神鬼窺覷