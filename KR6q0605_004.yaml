body:
  text: 嗣法門人行嶽編小參二檀越請小參田單問如何是出身句師云堂外禪坐堂內坐禪值牲問生死到來如何抵敵師云三世諸佛不知有進云目前一著子不得縱橫過在甚處師云狸奴白牯卻知有問以大圓覺為我伽藍如何是大圓覺師云近前來與汝道僧擬開口師便喝僧又申問師便打問凡所有相皆是虗妄為甚有山河大地聲未絶師便打又僧出師亦打僧退師乃云山僧未出方丈早已知歸猶是不唧𠺕漢更待向前喫棒得與麼不知痛癢然而既到者裏且聽山僧説夢山僧閉門打睡夢坐一道場倣佛浴佛前後薰風天氣遠近緇素設供甚盛山僧因齋慶讚訖間行殿際歸坐法堂走出一巍巍堂堂副寺來禮拜起出廣長舌相吐舌覆面次滿十方高至梵天漸漸𭣣轉摺作七十二疊還復納口舌相才隱眉間放白毫淨光光中出大音聲云啓白和尚太子殿殿主偷供佛果子山僧云如何偷供佛果子進云早間取去五碗晚間送來五碗山僧不覺驚起蓋此上人實難酬對若道殿主偷果子取去五碗送還五碗如何是偷果子若道副寺妄語安有如是廣長舌相人而肯誑言不實不惟山僧不能對遍問各寮頭首皆不肯對山僧次日坐睡乃見前來副寺重理前話露柱中忽然走箇一般巍巍堂堂的殿主出來高聲喝住云副寺莫謗人他云如何謗人乃云早來未嘗取果子晚來何從還果子於是空王佛歡喜踴躍通身毛孔皆笑直得六種震動山河大地明暗色空情與無情齊入如來大寂滅海召衆云會麼若也會得管教夢覺俱空若也不會須知一回喫水一回噎驀卓拄杖喝一喝下座五日雲禪薦親請小參僧問請師直道妙玄機師竪拄杖云烏藤七尺進云恁麼大悲千手眼原來只箇身師云千鈞之弩不為鼷鼠發機進云龍承點眼歸東海虎得抽牙出杏林師云急走過問寂寂惺惺時了無巴鼻未審者著子作麼生定當師云毒蛇橫腳下進云正與麼時主人公在甚麼處師云站過一邊進云恁麼則知音總在間忙裏不待安居結制期師云直要頭破腦裂問舍利弗入城月上女出城是甚麼人分中事師云進前來與汝道進云和尚現大人相師打云捉兔亦全其力進云有時恁麼便恁麼有時恁麼即不恁麼師復打云還要第二杓進云不知三世諸佛有此病麼師云得恁皮下無血師乃云人如楚大夫國無叛臣家無逆子忠屈一時義申千古此是千佛會中一數出家兒莫莾鹵精白一心視乃祖身世遠且大何近欺聾瞽人稱大覺璉誰見狐生虎驀卓拄杖喝一喝復舉西天九祖密多尊者生提伽國年五十口未曾言足未曾履八祖遊化見其舍有白光乞侍者於其父尊者遽起禮拜而説偈曰父母非我親誰是最親者諸佛非我道誰是最道者八祖曰汝言與心親父母非可比汝行與道合諸佛心即是外求有相佛與汝不相似欲識汝本心非合亦非離且道如何是非合亦非離不見道虗空無內外心法亦如此若了虗空故是達真如理聽取山僧報以木桃父母為我親誰非最親者諸佛為我道誰非最道者若有耳食者出來云和尚前言不應後語適來辨魔揀異而今又作恁麼話驀喝一喝云癡人面前莫説打你頭破腦裂不知坐斷十方剛見逢人即揖下座晚參師問維那云千鈞之弩不為鼷鼠發機為甚古德見僧入門便喝進云車不橫推理無曲斷師云我為甚麼容人在者裏立進云大家有分師云還是與你棒喫不與你棒喫進云一任和尚師云自領去進云知恩有地僧問如何是學人本來面目師云三箇眼睛四箇鼻孔問那吒太子析骨還父析肉還母現本來身為父母説法如何是本來身師云露進云萬古碧潭空界月再三撈摝始應知師以扇子東西畫數畫云前三三後三三是甚麼字進云禮拜和尚師便喝柴頭問撥草瞻風祇圖見性如何是性師云兩捆柴一擔挑進云蒙師指出金剛眼照見父母未生前師云日日三擔莫軃懶進云如人飲水冷暖自知師云好生著力問馬祖一喝百丈三日耳聾意旨如何師云非汝所言進云黃檗吐舌又作麼生師云兩重公案問不慕諸聖不重己靈還有向上事也無師云有進云如何是向上事師云東司頭去撒進云恁麼則直截去也師云莫惹人掩鼻問大智文殊因甚出女子定不得師云那裏學得來進云即今問和尚師云一人傳虗千人傳實進云因甚罔明出得師云一處不通兩處失功進云春色無高下花枝有短長師云學語之流師乃顧視左右云諸大衆大有生滅不停底在努力今生須了却莫教纍劫受餘殃衆擬議師以拄杖一時打散晚參師云石磉斫破你諸人腦殼露柱走入你諸人鼻孔裏僧出作禮云連朝天雨不扇自涼師云急走過師良久顧左右云禍不入慎家之門各請歸寮衆作禮一僧云如水乳合師云將謂停囚長智晚參僧問不慕諸聖不重己靈時如何師云利刃有蜜不須舐蠱毒之家水莫嘗問脫體無依倚猶自立邊疆請問和尚過在甚麼處師云急走過進云撒手千峰外渠儂得自繇又作麼生師云近前來喫棒進云與麼則分明一點乾坤露誰識其中有活龍師云須是皮下有血問天地未分日月未明本來面目在甚麼處師云荷葉團團團似鏡菱角尖尖尖似錐師乃云世尊四十九年説法秪接得箇飲光山僧二十年來無法可説一味痛呵毒棒若是知好惡的管教一箇箇超佛越祖去情義盡從貧處斷世人偏向有錢家驀喝一喝卓拄杖下座戊戌上巳荊溪衆檀越請師入主磬山小參師竪拂云龜毛拂子利如錐舉出離情作者知生平不輕全許可拈香須將虎鬚兒拈香云此一瓣香供養即此磬山堂上得度得法本師開山老和尚用報無恩之恩斂衣就座云阿呵呵自具一雙瘦冷腳未曾輕踐等間山乃指香案云先師建立者箇公案經十餘載佛祖不敢正眼覷著昔年却被某上座徹底翻轉先師直得吼聲如雷數十年來要人代他雪屈今日剛得衆檀護出手扶起所謂佛法付與王臣于今見之某上座于此座上顯現先師全身去也驀拈拄杖卓一卓喝一喝下座晚參師云汝諸大衆未出母胎已與山僧相見了也已受山僧究竟了也還信得及麼一僧禮拜而出師云似則似是則不是師乃云各各信得及則堂上先老人刻刻與汝諸人耳提面命若信不及則三八晚參𥁞須腦門著地一僧出禮拜大衆久立師云大衆等你答話進云與和尚同鼻孔出氣師云急走過晚參師云如何是無寒暑處寒時寒殺闍黎熱時熱殺闍黎大衆還會麼衆無語師云同是山中人應識山中語結制早參師云開山老和尚甲戌冬此日開爐茆茨草榻築雪烹雲指點磚頭土塊為諸人發上上機直教寒谷春回花開石筍接待三十年來今戊戌冬亦于此日開爐殿堂寮舍具體而微知浴盡誠檀護一德香齋次第燈燭輝煌法法頭頭點發一切人四楞著地直教紅爐涌雪月冷風高獨露磬山面目且道開山老人乍住為人心切久住為人心切喝一喝云粉骨碎身未足酬到此了然超百億晚參師舉扇子云扇子𨁝跳上三十三天築著帝釋鼻孔東海鯉魚打一棒雨似盆傾有一上座雲門大師踏在腳底進堂出寮撞著露柱且道是那一箇衆久立師呵呵大笑歸寢室晚參僧問月白風清未是衲僧極則未審如何即是師云巡照鳴椎催坐香進云恁麼則頂門有眼還同瞽句裏無私用最親師云何不向下薦取進云秪如下載清風者拽耙牽犂説向誰師云依稀似曲進云謝師答話師云且過一邊僧禮拜師良久舉如意顧衆云看看大千世界總被如意吞却了也會得的近前來喫棒會不得的歸堂坐香晚參僧問敗子成家不許東拋西擲者箇公案還是和尚建立麼師微笑進云草賊大敗師云已放過進云轉見不堪師呵呵大笑云却使山僧笑轉新問出頭天外誰能委任運無私作者知秪如不涉程途如何接待師云近前來與汝棒喫僧便喝師云好一喝遲了八刻進云和尚領取一半師云再犯不容又僧出才伸問師云踏步已知來見解何勞更舉轢中泥僧復進語師不顧悅衆鳴引磬大衆仍久立師云大衆三十棒悅衆三十棒早參衆問話畢師云向上一路千聖不傳過去佛祖如是説現在佛祖如是説未來佛祖如是説有者又道千聖不然又道熱碗鳴聲競欲接竹點天未免影響之徒視同兒戲不見大梅道惑亂人未有了日在任他非心非佛我只管即心即佛鳳毛麟趾好生取則驀休去晚參僧問承師示誨露柱成佛覺性難酬重乞證據師云放汝三十棒進云還丹一粒須加點木石同源鐵謂金師云識痛癢好問踢翻滄海大地塵飛喝散白雲虗空粉碎語未竟師云放汝三十棒進云棒頭有眼明如日要識真金火裏看師云更要第二杓僧喝師云急走過問法無上下高低因甚天上一輪滿月人間盡稱月半師云放汝三十棒進云遍界寒光即不問月輪落後又如何師便喝良久顧視左右云雲月是同溪山各異早參僧問馬大師道即心即佛南泉道不是心不是佛不是物未審和尚作麼生道師云即心即佛不是心不是佛不是物僧擬議師便喝問今日深秋寒入骨前霜履菊花新且道明甚麼邊事師便喝進云恁麼則露柱成佛已竟請和尚為衆説法師云三十棒待別時進云和尚説法已竟爭奈知恩者少師云且過一邊問如何是空手把鋤頭師便喝如何是步行騎水牛師云急走過如何是人從橋上過師云傅大士在汝腳底如何是橋流水不流師云更要第二杓惡水問水無筋骨因甚長流不斷師便喝進云恁麼則四面青山擎日月一湖碧水浴乾坤師連喝兩喝良久乃顧左右云清寒久立大衆珍重結制小參僧問天得一以清地得一以寧聖人得一而天下和平法王無上超出一切其有所得而然耶其無所得而然耶師云近前來與汝道進云有水皆含月無山不帶雲師云放汝三十棒進云拂拂清風生法座定教海晏與河清師云過問釋迦過去彌勒未來正當此日請師舉唱師云倚天長劍逼人寒進云如何是第一玄師云知音不用頻頻舉進云如何是第二玄師云漚和爭負截流機進云如何是第三玄師云一條拄杖兩人舁問結夏安居即不問請轉法輪事如何師云薰風自南來殿閣生微涼師乃云山僧積勞久病窀穸先親志惟廬墓因編集先録暫稽舊山居此報恩西序頭首當專治佛法凡自利利他常住事與堂中無涉者不必干預間住執事當專究本分不可間議間管別事東序頭首及一切執事事事處處當以助衆成道為心不可舉用好事喜功之人有誤修行研究佛法如登山須到頂入海須到底登山不到頂不知宇宙之寬廣入海不到底不知滄溟之淵深顧左右云今日結制之辰何不舉揚大法提掇宗乘乃作如斯尋常語話驀喝一喝云不見道大凡演唱宗乘一句語須具三玄門一玄門須具三要路有權有實有照有用又不聞曹洞五位回互雲門一字三關溈仰父子投機法眼三界唯心若能洞明大法了悟宗乘山僧恁麼告報端不尋常驀卓拄杖喝一喝下座晚參師云盡十方虗空是箇火爐四生九有盡向冷地裏坐不知以何法遮掩衆競出答話師云師子咬人韓盧逐塊庚子夏過大雄端陽日檀越請小參師乃橫按拄杖云身心水月世界鏡花十方寂寂萬法間間説甚海寬地厚有何鳬短鶴長舉手攀南斗回身倚北辰出頭天外看盡是我般人卓拄杖下座晚參師拈拄杖云山僧拄杖子吞却山河大地汝諸大衆向何處安身立命衆無語師云不是冤家不聚頭晚參師拈拄杖僧問如何是一切聖賢如電拂師云棒打石人頭嚗嚗論實事進云見性成佛事如何師云兩重公案進云一亘晴空淨寒光絶是非師云再犯不容師乃云清虗之理畢竟無身如理如事官不容針觸瞎千聖頂𩕳眼曹山潦倒強惺惺驀卓拄杖喝一喝禮塔歸晚參師云若人識得心大地無寸土天目代出明心見性祖師因甚卻有許多奇松怪石衆良久師以禪板拍案云人歸大國方知貴水到瀟湘一樣清晚參師云敲空作響擊石無聲大衆默坐時成得什麼章句課誦時能有幾人不動口衆無語師云放下衲僧鐵面皮切莫隨羣與逐隊即事晚參師云適來坐睡作得一夢夢見露柱害病請醫診脈却請著箇良醫把他從頭至足診了一遍告他道你本無病却是自生顛倒自討苦喫露柱恍然大悟通身踊躍從無始至盡未來際覓病起處了不可得頓入塵塵三昧與盡虗空遍法界情與無情一時同證大安樂法門直教山河大地明暗色空異口同音一唱三歎慶幸希有剛被門邊立著箇央庠禪和子掉頭不信摩挲露柱云你分明是箇立地死漢惹得磉盤開口喝云你恁麼正是撞著露柱的瞎漢山僧聞他者喝不覺歡喜便乃驚醒問汝大衆露柱害病醫他好不醫他好若道醫他則無妄之藥不可試也若道不醫豈可覺時佛法與夢時一般到者裏如何決擇良久顧左右云夜深歇去晚參師云昨夜有僧問無夢無想主人公在什麼處聲未絶山僧以手掩其口有透得過的代進一語庶不孤負山僧良久云雨華亭騎案山入佛殿去也入夜堂中坐參復令透此話夜深師云却得露柱透過了告山僧云雨華亭騎案山入佛殿是真語者實語者直令闔天目山內外大衆一箇箇毛孔中著得幾座佛殿既有此木上座道了蓋覆得大衆過向下文長付在來日月小參師云古人道石頭大的大小的小明什麼邊事又云玩月還是陰處好明處好衆競進語師乃云昔日有書生來參山僧問他道鳶飛戾天魚躍於淵言其上下察也如何是察的道理士答不契山僧自代云黑諸人會得者一語要透適來兩問也不難七月朔日早參師云三秋今日始一夏事如何萬里無寸草淨地奈先屙好大哥還他肌骨好不用著衣多晚參師握竹篦作撫琴勢僧出問作麼生得四稜踏地師云擬釣鯨鯢師乃云昨晚香嚴禪師入室告報山僧道堂中大有人會得老僧上樹話且道是那一箇衆無語師連聲咄云盤山會裏翻筋斗到此方知普化顛中元小參師拈拄杖僧問如何是奪人不奪境師竪起拄杖進云如何是奪境不奪人師云禮拜著進云如何是人境兩俱奪師云今日且放過進云如何是人境俱不奪師云謝汝齊進云料揀已蒙師指示即今臨濟大師是何面目師便打僧云咦師又打幾擊著琉璃又僧問西來大意則不問如何是正法眼藏師云琉璃代汝喫棒了也進云與麼則當頭照耀師云得恁知痛癢問一子出家九族升天目連神通為甚救母不得師云汝是大不孝人進云父子上山各自努力玄沙悟道為甚其父生天師云汝是大修行人進云只如和尚歡衡祖令師範人天未審尊人居何地位師震威一喝進云如是則幽顯普利萬彚沾恩師云前溪水急後嶺風高師乃云祖乍住頗荒涼準擬秋來絶稻糧每日雲堂共危坐晚參人道似汾陽召大衆云西河有當門師子來者即便咬殺若為入得汾陽門見得汾陽人驀喝一喝和聲卓拄杖云我不可作汾陽兒孫不得然雖如是事無一向今日却值佛歡喜僧自恣之辰十方雲集香飯飽餐且道西峰師子與西河師子同聲相應耶超宗異目耶直立拄杖云看取汾陽祖師在山僧拄杖頭上坐寶蓮華之座出廣長舌相遍覆三千大千世界地搖六震草木瓦礫悉演法音琅琅説頌云三玄三要事難分得意忘言道易親一句明明該萬象寶盆珍饌供三尊下座晚參師握拄杖坐良久乃云我觀坐禪瞌睡者大都是不善用心我今不要你們用心一箇箇令汝等見性去願麼一僧作禮云和尚慈悲師指云大家禮取露柱卓拄杖云待磉盤教住來向山僧手中喫棒晚參師云僧問古德學人乍入叢林乞師指箇入處古德云還聞偃溪水聲麼僧云聞德云向者裏入汝等諸人作麼生會一僧云仰止巖前師子吼雨華橋上牧童歸師云三級浪高魚化龍癡人猶戽夜塘水一僧云從門入者不是家珍師云自領三十棒乃顧左右云歸堂喫茶晚參師云堂中四箇露柱一時成佛去也召衆云且道成佛的事作麼生乃云直得現大人相爍破山河大地令古之今之瞻仰他不及回避他不及汝輩何得堆堆守故轍以竹篦旋風打散晚參師舉竹篦子云大衆喚者箇作什麼良久師乃云夜來虗空落地大衆眉毛無恙逢人覿靣提持未免觸途成滯所謂百千澄清大海棄之而惟認一浮漚以竹篦向地一畫豎前殿桐鄉公李護法送齋僧大鍋等進山同遜豫鋐上座體淨常禪人請小參師云我有一間殿無外亦無內廣蔭幾多人問著難理會我有供衆鍋不少亦不多到來盡飽餐飯罷任摩挲我有二三子非勤亦非惰語默絶思惟動靜無虗過下座燈節晚參師云龍池石磬報恩大雄天目每年新正半月禮祖正當禮拜時且道祖師對大衆説什麼法衆答話畢師左右顧視云各各頂門著地始得晚參師拈拄杖云汝諸大衆各各會得大地無寸土麼一僧喝師云昨日有人胡喝亂喝三十棒趁出去也師乃云主山高案山低佛涅槃日晚參師召大衆云今日是什麼日子衆答話畢師乃云三春今已半箇事合如何全身示現日睡眼細摩挲大悲誕晚參師杖空一下召大衆云敲空作響擊木無聲會麼晚參師云若人識得心大地無寸土釋迦文佛睹明星時天目山大轉法輪阿誰得聞衆各進語師云若不藍田射石虎如何識得李將軍小參師云今日是開山高祖誕辰舉則公案供養大衆昔日高祖住此西峰上堂云盡十方世界是箇盂汝等諸人喫粥喫飯也在裏許屙矢放溺也在裏許行住坐臥乃至一動一靜總在裏許若也識得達磨大師只與你作箇洗腳奴子若也不識二時粥飯將什麼喫參師云高祖恁麼告報却似俯憐幼子提獎嬰兒新天目却要問取久參衲子盡大地是箇盂喚什麼作穿衣喫飯喚什麼作屙矢放溺喚什麼作行住坐臥語默動靜若也識得更有什麼達磨大師若