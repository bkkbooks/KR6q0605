真珠示之便總不知時五方天王皆悉悟去先磬山云世尊奇特俾天王一一悟道千古之下令人樂聞磬山不肖遠孫也要效顰不識大衆信得及未驀伸出拳云是什麼色若云是拳非珠老僧喚他近前來你恁麼道天王不如且道是賞伊是罰伊師云山僧聞此直得帆隨湘轉望衡九面還有與新天目同參的麼良久云法如大海須將大海來傾取大海去晚參師示衆云凡看公案須研窮佛祖落處不可在語脈裏轉嫫母效顰邯鄲學步見笑大方取譏識者今將晚參所舉隨色摩尼因緣逐一徵示且道天王悟去在擡手處不在擡手處是拳非珠是超宗異目語是觸途成滯語若道超宗異目為甚先磬山云是賞伊是罰伊若道觸途成滯為甚云你恁麼道天王不如承言者喪滯句者迷言無展事語不投機晚參師云晚來山行巽僧百骸潰散時如何進云遍界不曾藏山僧指面前石云喚者箇作甚麼僧無語有人代他進得一語麼良久云從緣薦得相應疾就體消停得力遲結夏知浴同武林檀越請小參師拈拄杖僧問千年祖席重興萬古宗風再振除却語默棒喝請師別通消息師云進前來與汝道進云如是則銜月白牛露地走追風天馬帶雲飛師云急走過問九旬禁足即不問不涉功勳事若何師云放汝三十棒僧禮拜師云得恁知痛癢師乃云山僧出世三十餘年所有佛法盡皆説却了也今來天目住箇破院子領衆作務時作務坐禪時坐禪卓拄杖云切忌動著動著則三十棒靠拄杖云同入此門來熏風好著力塔院晚參師左右顧視云汝諸大衆各須使得一切時莫為一切時使轉得一切境莫為一切境轉良久震威一喝普請栽秧晚參師云古者道大衆為老僧開田老僧為大衆説大義天目則不然大衆未嘗栽田老僧却為説大義衆作禮師云維那何不道與麼則大衆一箇箇間間地去也盛暑晚參師云鑊湯爐炭裏回避無寒暑處回避且道那箇眼青那箇眼白衆答話畢師云謹白參玄人寒暑莫虗度晚參師舉扇云有見得雲門大師的麼維那進云今晚定雨師云大衆幾人打溼袈裟角那率衆作禮師云雷聲甚大謝雨晚參師云雲門大師本擬向扇子裏長伸兩腳安穩打眠剛被維那鳴椎竭力驚他出定直得雨似盆傾澤被萬物大衆有賴如今若為復請雲門大師向扇子裏入定去良久云轉扇子歸雲門大師復云既易轉扇子歸雲門轉大師歸扇子何難祖堂晚參師云大衆在祖師毛孔中作禮祖師在大衆眉毛上趺坐早參師云夜來露柱子入室報道到處走一遭審知今時參學人一箇箇銅頭鐵額老大虗空整片掉將下來墻壁瓦礫悉百雜碎惟有參學人依舊眉端目正全沒星子事山僧向他道臘月三十日快到各自打掃門前管甚東家杓柄長西家杓柄短露柱子聞即沖舉山僧一夜半疑半信適來侍者云大衆早參山僧不覺踊躍者件疑事有箇雪處問諸大衆各各有甚護身符子衆答不契師拈拄杖旋風打散衆作禮師擲拄杖云一日復一日年從頭上增除夕晚參師云今日未悟道者不合睡凡未悟道者如為客未到家一般不見古人云旅館寒燈獨不眠客心何事轉悽然故鄉今夜思千里霜𩬆明朝又一年已悟道者亦不合睡凡悟道者如生西方一般所謂如蓮華開似大夢覺從此應無寒暑無晝夜久悟道者亦不合睡凡久悟道者應般若清楚如所謂夢中説六波羅蜜與醒時説六波羅蜜是同是別此等葛藤應趁殘年討箇倒斷何俟當來問取彌勒是為天目三不睡昔人家風淡泊每説小參以為供養天目今日報恩堂佛事完遲説此三不睡以為晚參早參問話畢師云天目有三訣一訣一鐵橛若人吹得通佛祖下風列會得的對衆激揚如或未能山僧自為頌出第一訣虗空著地擲壓倒萬萬人阿㖿阿㖿泣第二訣龍女解成佛大海徹底乾紅爐片片雪第三訣門有當行客各自買與賣不費主人力衆作禮師左右顧視云將此深心奉塵剎是則名為報佛恩早參師云向上向下熱鳴聲別有生機鏤冰琢玉不是龍門客切忌遭點額驀拈拄杖大衆一齊趨退師擲下拄杖早參師云一則公案不透即是本參不透古人參學片語未通廢寢忘餐決定討箇分曉豈肯此間一期那間一期寄籬因熱舐指𪭺柱窮年積歲半飽半飢眼光落地恍惚慞惶前路渺茫噬臍無及汝諸大衆會得夜來三訣頌便許會濟上三玄更有三要語在切莫造次然而者件事一了百了一處通千處萬處通一節了千節萬節了果能契悟本來舉一明三自然明逾杲日威迅雷霆直教人藏身無地掩耳不及所以道三玄三要事難分得意忘言道易親一句明明該萬象驀喝一喝和聲將竹篦子拍案一下上開山祖塔供師拈香云虗空粉碎地平沉真參實悟眼中金枕子落地安邦國管見狂奴窖底評師繞塔畢復作禮云透脫重關代有聞死關終世更何人沐猴晝錦氣蓋世姬馬噬臍懊惱深上中祖塔供師拈香云透脫重關句法雲拈出新生平不曾悟霹靂鴨能聞師繞塔畢復作禮云有道惟頻退身世如浮雲參禪無祕訣承言生怒癭結秋小參師云皮膚脫落盡惟有一真實大衆會麼乃云汾陽化紙禹門普梆天目者裏前溪水急後嶺風高且道那箇在前那箇在後良久云歸堂喫茶友石靜主領寧國衆檀越請小參衆問話畢師云昔有政禪師每騎牛出入人呼之為政黃牛住錦里功臣寺數十餘年未嘗説法有問之者曰吾倩萬象開演我説有盡此之開演無窮今日友石上座同諸檀越啓請説法又作麼生須知萬象開演我説無窮無言頂其聲如雷玉柱峯通身是眼雨華橋橋流水峙旭日翠微和合高歌諸上善人來時好道去時亦如來時一香一果充塞寰區一米一豆十方普供且道佛法極則一句是如何衝開碧落松千尺截斷紅塵水一溪東山祖忌拈香師云透白雲重關行少室正令有昭覺如龍得水似虎生翼唐虞之際於斯為盛靠者著子如須彌山至簡至要至易至直萬般存此道一味信前緣言而世為天下法行而世為天下則天目拈一片香直是仰望不及小參舉黃檗接臨濟公案師示頌云生成鐵壁銅墻能禁雨傾風撼平地壁倒墻坍受敵驚羣八面寒光百鍊千鎚真金色變不變要識師子搏兒不露爪牙難辨小參舉趙州十二時歌師示頌云識心見性不蹉路廓然太虗露露露平常心道擬即乖知與不知二俱墮南泉終日口吧吧問著無言忙下座超宗異目克家兒勘遍諸方闢門戶向北天空日月寬石橋平滑人難度砒霜鴆毒滿把摣虎狼蛇蝎供坐臥不下繩牀接趙王敲扉排戶鳴飢餓步行騎馬亦騎羊眼青無佛亦無祖教會婆婆轉藏經臺山有路親勘破嘻笑怒罵震如雷倒雪高聲墮雲霧知音緘口靜焚香等間寄取鍬子去九月朔檀越請小參師云天得一以清地得一以寧君得一以明父得一以慈子得一以孝友得一以恆且道道者得一又作麼生師拈拂子云釋迦文佛以至孝成無上正等正覺達磨大師以至孝鼻祖支那六祖大師以至孝傳法開宗先磬山老和尚以至孝得龍池正印今日武林魏檀越母難之辰同諸善友得得入山設齋請法是為大孝之大孝且華果同時自利利親一句作麼生道火裏金蓮高十丈披風拂月長精神下座四月八日晚參師云凡在天目住者辛苦真辛苦淡薄真淡薄然須各各檢點為甚來受此淡薄為甚來受此辛苦果能究竟則著衣不挂一縷𮈔喫飯不嚼一粒米走路不動步作務不動手淡薄不淡薄辛苦不辛苦有入處的如此行持愈退愈進愈晦愈明未有入處的如此行持自然工夫成片管教定有入處大衆作禮師復云肯信者幾句老實告報便見釋迦老子時時出生在在成道結冬請小參師拈拄杖云真參實悟人多是名佛出世真參實悟人少是名佛涅槃今日正當結制之始却值三祖尊者涅槃之辰有識得祖師面目現在者出衆相見一僧云遍界不曾藏一僧喝師云各與三十棒師乃云江之南江之北六六三十六淵之深天之遠兩眼對兩眼春花秋月夏雲冬雪東涌西沒西涌東沒顧視左右云從上來不可按牛頭喫草如世良馬見鞭影而高飛驀喝一喝和聲卓拄杖下座除夕晚參師云汝諸大衆同此天目度歲還知有奇特事麼良久云日日香煙夜夜燈千丈巖早參師示衆云祖師鼻孔長大衆鼻孔長知客進云將謂和尚忘却師云腦後惺惺早參問話畢師乃云參禪無祕訣只要生死切絶思惟處道將來吸盡西江口門濶若還熟處不能忘追逐波旬遠彌勒棄諸所重學無生記取夜行莫履白驀喝一喝云鵝王擇乳龍象蹴踏下座佛成道日早參副寺問一句當天永絶八萬門生死未審是那一句師云細磨豆粞供午㸑旋挑脫粟接朝炊師乃云本師釋迦文佛云一切衆生皆具如來智慧德相但以妄想執著不能證得汝諸大衆還知智慧德相麼內不見有身心外不見有世界發真歸源十虗消殞妄想寂滅執著淨𥁞情與無情同成正覺且道塵塵三昧一句作麼生道良久云裏粥碟裏菜下座晦日晚參師云本山大衆固是精勤苦行但解制以來不無減舊增新更為申示自後久居大衆須以尋常家範説與初進諸賢第一須敦尚戒德已圓大戒者貴乎身心俱淨方受具戒十戒者即須嚴束身口初出家者須精持五戒五戒為衆戒根本為一切法之根本也凡半月半月誦戒證戒各須依時齊集執事者尋常見人持戒不嚴即行舉退不可留一敗羣者於中儻有證戒誦戒違約不到即行舉罰助衆精嚴不可失舉致滋懈怠如是方為清衆同居第二要福慧兩嚴來此祖須求入祖師閫奧出生死絶輪回間忙動靜須似木人坐臥木人行動時時觀看此身如死尸一般如何解飲食解作為切切看破念頭起處則一切處是你成正覺處一切時是你成正覺時所以十方世界無針鋒許非佛菩薩捨身命辦道證道處不相信者母勞共住第三自利利他須發願回向仰三尊之力懺其已往悔其將來二時課誦務用精勤時至執事者尤當以領衆為心散衆不到盡執舉罰各執不到互相舉察自然人人精進至於饔餐稍繼須念世之飢寒困苦凡遇普請念誦務須勇往直前四恩總報三有齊資顧視左右云前三約終身可行後勸勉及時濟物所以行之者一也是故君子誠之為貴召大衆云久立珍重檀越請小參師云一切有為法如夢幻泡影如露亦如電應作如是觀者釋迦文佛普利有情將安養世界瓊樓寶閣化食化衣八功德池七重行樹微風衆樂異鳥同音種種殊勝掇在人人目前直令過現未來學般若菩薩空男女等老稚忘緇素同一眼見同一耳聞同一身證光明無量壽命無量眷屬無量與諸上善人俱會一處飯食之頃盛衆妙華遍供十方無量諸佛如是自利是為大利如是益人是為大益且離幻大覺一句作麼生道虗空撲落地柏樹子成佛震威一喝和聲擊如意下座解制小參師云壬子年閏七月結夏一百二十日天目亦隨例留得諸禪多淡泊一月多辛苦一月今年田稻熟去住飽禪悅古路鐵蛇橫拄杖笑不輟衆中有一天人獻花無路鬼神窺覻無門的與大衆同坐眠同作息且道是誰識得咄咄咄截路溪溪水潔明標雲樹樹松奇出下座科司馬祈嗣請小參師云法界洪寬聖凡靡間道源深密智巧何施得意忘言盡塵沙國土是當人一隻眼返聞識性總十二類生為如來千億身高不可踰卑而彌厚爭之無我讓之匪他放行白鶴鸚鵡生輝把住照乘連城失色承先則本端而流遠開後則根固而葉蕃其入世也百花林裏坐一葉不沾身其超世也古佛殿前行千燈競發焰且道是什麼人能行恁麼事眼中著得須彌山指端傾出倉溟水下座晚參師左右顧視云結制來一月也金剛圈作麼生栗𣗥蓬作麼主衆競答話師云道得的也三十棒道不得的也三十棒衆作禮師云識法者懼晚參師云盡大地是箇火坑得何三昧不被燒却因甚道玩人喪德一僧云三十年後大有人恁麼問師云何不道驚人之句千古罕聞師顧視左右云山僧為甚昨日不肯今日却肯衆聳然拱默師云我不輕於汝等汝等本來是佛佛成道日知浴領檀越請小參僧問如何是趙州闋師云五九四十五窮漢街頭舞問古人道盡大地無纖毫過患猶為轉句不見一法始是半提更須知有向上全提時節如何是向上全提的時節師云許你膽大進云恁麼則雪滿長安衆盈猊座師云知痛癢好進云末後一言更望布施師云識法者懼問度盡衆生方成佛道如何度衆生師云世尊成道日檀越送衣來進云如何成道師云無立雪人焉明覩星事師乃云有一道真言病者得瘥貧者得寶苦者得樂天者得壽富者愈富貴者愈貴長年者長年中尊安樂者安樂中尊是大神咒是大明咒是無上咒是無等等咒能除一切苦真實不虗且道是那一道真言一切衆生具有如來智慧德相但以妄想執著不能證得師震威一喝云若也直下透得何須六年苦行夜半明星如或未然試看先宗是何標格下座晚參僧出問現前即不問聲未絶師便打又僧出才作禮師亦打師乃云老僧數十年來與人婆婆和和今日索性婆和到底隨聲以拄杖旋風打散解夏結秋清溪檀越請小參侍者報衆集久立師云向道老和尚與大衆説法竟衆聞踴躍作禮而退癸丑九月朔小參僧問如何是實相義師云進前來與汝道僧擬議師便喝師乃云水懸山立雲外高標雙塔峻風恬月滿牀中古剎一川平坦坦夷夷處突突兀兀突突兀兀處坦坦夷夷有時重關深掩有時遍界分身欲從重關深掩處相見却也遍界分身欲從遍界分身處相見却也重關深掩得意忘言千里同風迷封滯殼覿靣萬里傾蓋如故白首如新十室忠信一賢好學把住驚龍象放行馴鹿鷗師視左右云久立珍重下座小參問話畢師云空花千朵目翳自欺些子金剛穢軀裂出出門問道好惡須知發步研宗邪正莫混形端影直響順聲和煮砂終不成糜種豆焉能得穀久參上士揀魔辨異明析是非庶可自利利他若也菽麥不分奴即不辨四恩難報枉廁僧倫不是與人難共合大都緇素要分明下座小參師云山僧日來端居丈室許久不與大衆相見汝諸大衆各成枯木之侶頗不犯人苗稼拄杖子𨁝跳上三十三天揚聲大呌云東西南北四維上下普皆吹大法螺擊大法鼓建大法幢如日普照如雷普震驚得閻羅大帝眉毛火發燒得東海龍王手忙腳亂波騰浪涌奔走赴訴剛遇前三門老巡照在枇杷樹下曝背坐睡懶牛鼾作師子吼驚得拄杖子退身三步潛身歸來依舊靠在山僧繩床角頭穿却內外大衆一切人鼻孔汝諸大衆十二時中語默動靜好生隄防木蛇橫古路切忌觸著觸著則禍生衆久立師震威一喝下座小參侍者報衆集師云向道老和尚在大衆鼻孔裏音釋噎於歇切音謁食窒氣不通也窀穸上朱倫切音肫下祥亦切音席窀穸墓穴幽堂也效顰下皮賔切音貧眉蹙也又強學人曰效顰嫫莫胡切音模醜嫗
