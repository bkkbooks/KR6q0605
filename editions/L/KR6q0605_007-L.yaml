body:
  text: 嗣法門人行岳編詩偈贈履坦禪人兼報天一居士鼎立三峰勢插天嶺門雖闢白雲連飛鴻傳得人間信石壁難依過別川入磬山隱居風範依然在說法堂前任草生莫謂門能閴寂從來此道少人行示退菴重子住敔山澄江有山孰多僻敔山兩灣蒼翠積澄江有水孰多情敔山前後敔水平當年一身澹如水夜隨明月過深林化山擬作推蓬室扁舟乘興堪深入汝今為我先去住菴傍閒地多栽芋忘世情懷爾我同茅鐮鐵钁振先風得人不在門如市猶憶當年面壁翁贈禪人見道誰修道忘山好住山雪深巖屋老百衲一身閒又重巖之下茅屋耽耽有幽人兮雪立冰餐又好山如畫畫如山紅葉村村杖笠閒看到桃華成一笑再來雲外訪柴關守塔懷古多年黃葉類形骸此日徘徊誰偶諧麻衣草履食接氣象骨崖前呼再來咏懷千峰絕頂尖頭屋草薦柴牀火一爐三十年中無一事諸方何處覓潛夫靜夜思枝枝葉葉月疎疎密密風誰共蹋流水倚杖石橋東題壁星高月曉松雨滿衣西岡危坐嗒然忘歸偶題月浸千山冷風鳴萬木清一聲村外犬客路有人行山居荒凉苔壁寺孤冷草堂人雨後舒長望泥虎迹新烹泉廣修供養事如何百沸清泉上佛陀早色爭妍排闥入鶯啼古木梵音多對鏡華山蘭若對鏡吾非昔捫懷志自新何林一枝別蔭我雪霜身冬日有懷荊山旅堂空階栢子落饑鳥入門來千尺危巖下梅花幾𣗳開望臺山荒濶三千路高閒一萬人當年冰畔石遲我未歸身舟居三却竹林澹蕩寒煙古木孤懸雪浪輕帆只在尋常行處杳然萬壑千嵒又一葉千谿水三盂六月霜逢人不舞棹高臥對斜陽冬歸草堂潛形餐栢實放目看梅花何處忘機客同來灌古畬濟寧道中臨溪茅屋臨簷𣗳雞犬依依水國村虞夏平成風化永江南江北共林園讀白樂天詩懷扣冰舟次東昌池上有小舟舟中虗胡牀我心久忘世愧未使世忘甲馬營夜泊水上舟如織人間事若蕉無為與無欲誰共我逍遙節食寄形天地間飲食唯接氣翛然等個人明此澹泊意龍淵南塢坐月松𣗳三長四短石臺七高八低坐來夕陽在𣗳歸去月落峰西晝寢譬如木偶人鼓歇索亦住山僧動與靜請問諸露柱荊溪道中招友正是千山紅葉時摩挲石壁好題詩百年嚼蠟能多味分取松根帶露葵高祖寢堂題壁牀頭懸瀑布塔頂長苔衣一住不復入高寒到乃知示眾萬里晴空誰共三春花柳爭遊王孫醉眠芳草何似潄石枕流我有蓮舟一葉沙城芥劫全收高歌唾壺擊破童稚出沒洪流山居胸中無一事終日坐閒閒睡起摩挲腹山間與水間高步登山造極步自此始有懷君子行遠本邇促都監立還山山中有佳月宜人終夜看山中有好風解衣可盤桓泉鳴千嶂寂松靜一濤寒永日鳥相喚清秋蟲自紈解𦗟紫芝曲喬木在層巒活埋與斷壁千古仰金蘭時哉石梁雉雪飲且霞餐普請口占年來漸覺精神復老去偏知日月閒飽飯安眠無一事椎鳴隨眾看秋山枕流臺題石山中流水寂無聲枯木生花別有春若箇到來知解絕紅爐分取萬年冰庚戌二月磬山題壁面目分明徧界親偏於此地受恩深三更月下徊立恍是當年侍拂巾磬山揮麈臺先錄法濟十咏之一有此名松根時獨坐花雨不從栽憶昔別峰侍無言聲似雷庚戌題壁三首本是矜矜自了僧飽餐安寢別無能酬恩報祖雄明哲斗室焚香懷古人一霜華半榻雲無求無喜亦無嗔三更對月開扉坐慚愧焚香侍立人臥倚青山飯白雲谿聲鳥語共晨昏空庭有隙栽蘭蕙緘戶無蹊入怨恩捲簾尋常入望驚殊絕何意全身住此中傳語巖棲木石侶時時放眼識雲松獨樂園雨後二首一谿銀鳳玉龍騰想見霜華此得名步到上方忘藥石勞他從者請頻頻枕流石上枕流臺到者教君悔晚來白鷺羣飛千磵雪洪鐘大扣萬山雷巡寮至大義閣癸丑燈前花滿寒庭月滿林巡寮未半欲三更到門且莫掀簾入愛此樓前布水聲邗江贈虎公至契交道江河下於公見古人素心千里月青目一山晴楚州題壁澹黃微綠拂疏風到處垂楊適我慵覓得小舠𤓰子大一帆漂渺水雲中旅堂愛柳無如我摩挲玩嵗年旅堂忘岑寂一𣗳適垂軒開窓風聲雨聲聲聲入耳花色草色色色幽妍山居竹戶風清江入筵道吾一到至今傳逢塲竿木時思曳戀此華亭雪滿船菴名船子示淳徒病中接氣三盂粥消閒一縷香石牀黃葉襯何處得嚴霜天目雙清莊兩峰清拍肩雙谿寒共語中有一徑清昔人此遐舉金沙顧龍山留題宿處絕句不問江南與江北枯藜為友笠為菴龍山半日登臨足又蹋春風去去憨言志客夢秋山遠閒情黃葉深脚麻松下石過嶺覓禽音題壁栢庭霜夜月蘚屋夕陽風岑寂非人境犬聲東舍東廣武題壁松崖罷聽得梅而樂孤立月庭旅影落落藕塘題壁蹋徧秋林步步霜麻衣草履自清狂逢人𣗳側彽徊立惆悵千峰華政黃大雄山居臨海渾無地潛谿却有邨蘿菴在空碧鐘動月為門懷靜涵老居士落落松根石蒼苔沒欲平江風吹木葉寒月漾波清懷五玉弟江流清日夜今古葉聲乾高臥石牕下一燈相對寒絕糧山空水碧千指壁立摩挲布毛縫衣炊食壬辰歸報恩本是金峰苦行身芒鞵短拄舞還新漫教𣏌𣗥藩吾室指點泥丸光印人水滿蒲谿流夜月風生菊徑靜芳辰好來和我紫芝曲大小石頭正法輪高齋對月嗒焉忘言徙倚夜半皎皎毛髮月明九面禪者請書有一僊兮睡布被裏入被尋伊滿頭尿矢又扶起法堂拆却佛殿昔許爾聞今便眼見又方寸之𣗳生石柱底放華一葉覆徧大地荅老母若欲我度親別無法可度死𥁞世間心當下同佛祖江上十方菴慈氏芟染修行在行不在說萬事應須猛割截者回似斬一握𮈔一斬一切俱了畢頂上圓光含十虗從今更不重埋沒非是山僧輕度親十載先師曾記莂剎那具足丈夫儀法名通光號悟徹不向他人行處行管教步步蓮華國通光先磬山親題法名和示峰子山月滿檐諸子侍立面黃者黃面黑者黑或撥爐灰或研墨汁眼明手快善知時節擬索枯膓青藜三十題壁此偈贈一切人不能收取須還山僧萬年冰上久安居却向紅爐放雪飛到處逢人不相識瘦拳高枕自忘機對鏡有引向侍先磬山聞溈山荒寂有願四旬體胖曳杖往住二十年於茲矣適浴室臨鏡因有此偈不是溈山舊住僧年來四十骨稜稜金峰峰下堪鋤石待個英靈剔祖燈自擬有芝東巖東風兩石為屋嵩壁平莫攀龍山高可逐江上法願菴到處耕荒翻石笋今來坐月友寒烟半間老屋安親膝五合香粳努力煎草堂月喬林花滿地晴瀬月當天題石貽來哲應同徹曉禪代草堂老人示徒雲開山突突霜重栢蒼蒼倚徙閒寂寒籬菊晚香圍爐得月峯三長兩短此坐彼立當年有叟盆池欵客西樓題壁架月峰前獨坐時寶峰塔在翠烟西有言枕筆吟難就山水蒼茫客自知中臺書竹翠幢之下或坐或立惟有一閒長年眼碧杖底松風疑立海上峰春潮夜來急笑聲落層崖誰人和月拾寄羽明居士信宿金峰頂喜分半芋香荊溪一葦便拂袖意蒼茫草堂晝眠飯罷松根一榻清波濤萬頃屋頭聲年來滄海扁舟志起立千巖鳥碎鳴夏夜露坐星隨夕梵湧月為殘經留寒暑不到處松根六月秋掃徑掃出綠雲徑送來銜日山黃花紅葉際杖笠道人閒早叅罷明月入窓三尺雪松風拂簟一天濤夜來有客中立不負嵩山折葦勞大雄面壁巖夜坐將赴磬山請愛此一牀月長年臥掩關先師案欲了破雪問家山梅軒題柱此君澹似我我冷此君知風雨應嫌癖落花坐不移贈豫章齊居士解學死心禪世居山谷里春風歸去來湘江流不已松濤松濤堆裏來松濤堆裏住北山松濤濶南山松濤聚境濶勞亦濶境聚閒亦聚不緣恩未酬誰肯舍此去示眾大士誕舟次下相萬頃清風透碧紗西來一筏濟人賒同舟莫自拖泥水放下空拳指指斜歸草堂幻影歸草堂如臨秋水碧慈幃吾所依松竹吾所宅蕉葉入櫩櫳濃翠濕床席芟松愛山尤愛月芟竹亦芟松此夜西窓坐清光到曉風旅堂雜咏老松一萬𣗳新竹百千竿題遍琅玕碧寒濤枕上看山居無念常趺坐多閒時手書海棠開爛熳曳履步除雪齋歌懷徐羣玉世間少得休心客我學休心休未能何意賢親有吾子雪齋遙對兩閒人溪上吟望見青山眼便開前生疑此坐禪來千巖絕壁知題石拂蘚披雲榻取回乙巳五月十有七日未敢登山侍祖燈傍溪縛屋欲安僧大忘身世人來此看取懸崖千丈氷丙午題壁情忘若草木志定素氷霜客悟芭蕉法叅同絕較量秉燭踏雪愛雪尋廊步臨軒坐擁爐萬年冰畔客習氣未全除洗澗洗澗水深石出裁溪月冷風高兩堂聊蔽風雨看取種竹栽桃夜坐山影界天碧燈光在竹末誰來千仞巖伴我坐晨夕千丈巖西窓即事枕間懸瀑布几上叠千山絕學忘機客耳流齒石閒對百合花懷延陵公獨許空生親見聞滿前香色任縱橫人人不昧翁真面父子依依亘古今西方菴題壁寤寐泉聲三十年今來到處聽潺湲居山我不嫌風雨張葢看雲布水懸樵谿樵出溪溪水坐平石石峰芒鞋徧四海應念此山中龍鬚禮祖禮取龍鬚大徹堂祖翁面目絕遮藏人來何處尋蹤跡滿六年枕上霜既望夜叅後滿堂明月光誰蹋太白霜坐客亦輕擲題詩破夜香有懷淡紅淺碧八九𣗳江村茆屋兩三間草履麻衣食接氣客到平分一味閑新秋新秋設藥石橄欖款羣賢苦澁眸雙烱坐深月滿筵仰止閣題壁臥聽松風起啜茗粥短歌鼓腹庶幾知足辛亥重九後一日示相隨諸子兼懷下常住是年山邑饑登高三日雨夜來誰有詩兩堂木石侶束篾歌紫芝荒園翠竹兩竿梅一𣗳梅開竹孕鳥懷春荒園曳杖日無事揀點生生此性情雄峰有懷千峰深處三間屋石壁誰人先養松半芋平分慰饑渴十年雪臥放疎慵無能我是無能者人知我不能海天容浩蕩籬落任紛更莊笑蠻和觸諧稱鯤化鵬綱宗綜九鼎若箇振家聲虀粥肺腸久與君相洽一旦相逢似故人正脉危微識法懼他年帶篾與君親佛事在明禪人火生也不道死也不道咄哉古人未明向上一竅報恩則不然在明老衲昨日死今日擡來對眾燒亡僧起龕昔日七賢女游屍陁林一女指屍曰屍在者裏人向甚麼處去一女曰作麼作麼諸姊諦觀各各契悟師倚杖云者一隊死丫嬛好與一爐燒却靈利衲僧別有轉身一路舉杖指云髑髏𨁝跳上三十三天東海鯉魚打一棒雨似盆傾悼八十三默真老衲汝年頗不少汝死頗安好如何連夕來我心痛徹曉念汝度凶荒屈指可過了不虞麥甫黃倐爾音容杳苦樂未易空死生未易妙未證虗空心重來明此道我哭有餘哀宿有好懷抱自覺尊火尊柴頭一生擇木三遷勤普為眾臨寂撥置後事顓持藥師名號數日泊然坐脫生知所止死知所歸豈無俊士於茲徘徊咄哉行尊庶不虗為出世之人隱菴顯火顯圜頭勤樸十年如一日歲饑禾麥而園蔬獨豐一眾頼之隱菴顯老園頭十年為眾荷鍤不休惟是歸家一路幾番盤躃門頭吾今助汝一炬黃華白菜處處自繇印潭入塔即此物非他物取不得捨不得青山以為宅奠無障開闍黎一靈皮袋皮袋一靈即此皮袋無障真身杯茶盂飯聊盡眾心嗚呼尚饗奠志一達侍者老成衣鉢行達行達汝解四大空我今為汝說真空灋茶傾三奠香一爐洞如耆德火性空三昧火自焚實相身今日是我洞如老灋兄向火𦦨裏轉大灋輪令大地情與無情俱證究竟堅固大定現前大眾異口一音同誦首楞嚴王咒奠雲標岫侍司泥多佛大水長船高葉落歸根知己力來年仔細𤼵春條崒侍司火老成衣鉢雲開崒侍司諦信真空理四大各有歸斯人無去住無佛處作佛蓮華生碓嘴奠岸回老衲者漢生亦如是死亦如是吾許汝如是與汝一杯茶嘯岳月監院掩龕荷眾廿年來歲繞數千指頗多素心人澹永首肯爾掀眉絕眾緣清光滿大地師雙手掩龕云多少死於句下不能入道的阿師只作墻壁話會遂轉身設奠月監院火萬仞峰頭撒手時千華競放月明枝以炬繞龕云東西南北溈山火堪愛風顛胡亂吹奠寂菴洽子漚雲吾久視來去汝無拘汝有利生願重來讀舊書奠月岸彼老衲㨗去㨗來善終善始月岸彼老衲吾不弔汝而慶汝纖纖雲淨夜光寒更莫遲疑落二三拾得瀑華橋上笑絕塵千古髯無雙為南澗和尚火香水湛然滿浴此無垢人吾兄徹始終火裏洗箇澡為澹齋化主嚴土善上座火嚴土土嚴寂善善寂萬善已圓善可嘉嘉善告寂寂不寂再來重理舊𮈔綸嶺梅香透千江雪鎮知屋火師秉炬云者火從汝十餘年真實心中流出將來光天燭地去也遂投炬適大雨師歸方丈問眾雨從何來一僧云大家一身濕師云是何言歟復云新遷化上座為汝等說乾嚗嚗禪也不知量空寬都監火師舉炬云盡大地是寬上座一隻眼寬上座面前觸目菩提腦後圓光光萬丈山僧更為爾錦上鋪花便擲炬智周足副寺火足副寺生如幻死如幻𤼵心如幻出塵如幻辦道如幻進業如幻甘澹泊如幻忘勤勞如幻始終一德至死不變如幻更有一種如幻舉揚待汝重來秉炬云臨行助汝般若燄照徹人間與天上為織造馬護灋火舉炬云昔年相見無相見今日相違未始違欲識馬公真面目火裏蓮開大十圍雜著東語西話開了兩片皮只是粥飯罐當世有與麼人山僧禮他三拜顛仙謠憎愛胸中盡是非眼底空泥牛入海後聚散問漚風書溈山語行脚高士須向聲色裡睡眠聲色裡坐臥始得山谷云東坡文字語言歷刦贊揚有不能盡吾於溈山亦云戊子春二日荊邸書題雪竇頌古野鴨子知何許馬祖見來相共語話盡雲山水月情依然不會還飛去却把住道道頌出雪竇真能於法自在匪夷所思如清光匝地猶戽夜塘以盡所欲言而妙此却把住道道以不完題而妙盡所欲言如千雷並吼易不完題如千日並照難偶閱之直欲擊碎唾壺草堂書壁日中一食𣗳下一宿世尊模範如是一語不投折葦渡江少林九年終日面壁鼻祖標格何如荊山旅堂紀事丁亥十一月朔著新絮襖飽領本菴香飯飯餘展足熟睡皆行脚經年未曾有事睡起一趺晚晴快人遺景在屋庭東大𣗳茂綠未衰殊映日溢目忽憶十五年前得先師烏峰竹齋瞌睡起書牕浣壁時復憶甲戌秋先師遷吳興報恩是日結冬破屋敗垣炊巾滿谷羣賢臥草眠霜冰骨老人支枯藤指點磚頭瓦礫為諸人闡最上機余時獨處江千野色無垠天光連水曾和老人寄示偈云師闢山頭宇吾撑水上門脚仝蹋實地眼獨空叢林小兒無繩尺曠蕩之言不謂至今多人成誦昨便鴻南去拈句寄重監院高歌天地外穩臥雪霜中他日憶此更作何狀書巖子紙大雄道人廿年來炊冰煮雪接納諸方能三十夏不憚寒苦者敢保出他人一頭地巖子能否叅禪悟難既悟已忘悟難且道忘悟的人何如巖子道看此事極平易極欺人等閒看得平易者此最受人欺者也戒之哉多見人在殼漏子裡譚葢天葢地之道徒自欺耳葢天葢地者能把殼漏子作塗毒鼓撾書楚紙近年少至性衲子葢稍有見處不能出頭天外全體受用多以名利熏心學文字語言還知但患不成佛不怕佛不解說法麼筆此蜆子和尚卓立紙末三師說吾有三師父師母師師師父師生我眼師師開我眼母師護我眼父師身示無常此生我眼者也師師了我生死此開我眼者也母師勗我證果此護我眼者也三師皆有大因緣使我悚然省豁然開惻然痛吾何修而得此三善知識師也噫吾於荊溪磬山開此眼於江上水關忘此眼於吳興草堂保此眼不知何年得真不負三師也有客躡而問曰忘矣何用保為曰此非汝所知也保矣更俟何年不負師曰此非汝所知也待汝證果地涅槃與汝共報難報之恩可也雖然父師母師出離之緣皆頼師師師乎師乎粉骨碎身未足酧將此身心奉塵剎潛子苫次草述時乙未九月戊戌西樓聞雪潛子早失太山之仰不獲徧任兩序列職壬辰夏報恩乏住持供先老人方丈重歸侍室首修殿公務攝客司諸禪極不安潛子有餘樂也向志夙夜守塔每為事奪適寓監院寮後軒篝燈正當寶峰塔下漏下三十刻聞雪起立不禁清絕向於磬山有生平徼幸處千古快心時之句此際是第二番境界時壬辰十一月癸巳手書所用破硯猶是二十年前記室舊物并記報恩旅堂閒書近日學者有二病一等弄聰明習外學一等守愚抱拙般若不清楚二者皆不可與言道不識一丁者必如六祖方可不撥文字者必須遠同西天龍𣗳馬鳴近同永明明教始得無過題壁本學古人莫視流俗閱趙州語錄自勵跋趙州三佛話金佛不度爐木佛不度火泥佛不度水真佛內裏坐南嶽磨磚江西鹽醬不是過也又云非四十年不雜用心者不知斯言簡盡題藥師日課語予辭恩絕塵不暇披覽偶入藏閱藥師如來本願功德不覺手額失聲願人人入如來願海也或問何於此經驚歎如是告之曰予見世人順境淪溺者不一富貴可畏甚于貧賤今此如來使人所求如願遂從此永不退道直至菩提則欲於王臣長者一切人中作同事攝不乘如來願航何從濟乎大凡修持須量己量法直心直行誠能厭惡三畍堅志往生則專依阿彌陀經收攝六根淨念相繼所謂執持名號一心不亂决定往生此先自利而後利人者之所謂也若於現前富貴功名未能忘情男女飲食之欲未知深厭則往生法門未易深信即信矣身修淨土而心戀娑婆果何益乎則求其不離欲鈎而成佛智處於順境不致淪胥者固無如修持藥師願海者之殊勝難思也癸巳之夏山居不寧偶奉親歸養江上晏如程君以刻成藥師日課見示此出人意表是經流傳已久編成日課未之聞也乃得之吾江之善士為之助喜信能修持久久不懈知不獨富貴功名轉女成男離危廸吉如如意珠隨願成就即得於一切成就處直至菩提永無退轉何幸如之人間亦有揚州鶴但泛如來功德船錄餘杭道中詩舉目千矛刺淚流若為問路白雲頭大人君子今何在長歎一聲天地秋餘杭道中不知誰書此詩於壁題曰行脚紀事非目擊其中人者不知此詩之悲也書禹門先師翁詩後五峰雲頂古文殊盡日跏趺總笑余半點苦寒禁不得躊躇未了又躊躇此禹門師翁臺山卜居詩也師翁證處穩密超脫故微言澹語中煞有吼意琇生也晚何幸目聽洪音跋古德語諸佛未出世人人鼻孔撩天出世後為甚麼杳無消息三十棒寄打雪竇斯言函以卞玉綴以隋珠供於百寶浮屠之上當夜夜放千道奇光光中時現二龍𤼵大音聲金聲玉振千佛萬祖于其音中示生音中湼槃己丑中秋日手記跋大慧頌古相體裁衣量水打碓毫髮不差且居門外昨夜三更月到牕話後人逐塊亂頌無論蹉過南泉趙州還曾夢見大慧乎雨牕偶書書月祖偈自笑當年畫模則幾番紅了幾番黑如今謝主老還鄉那管生平得未得今人輕易敢稱笑巖後裔余略舉此偈示之請莫造次船子菴雜記中秋前後臥鋤雲堂泉聲山色爭勝月出當門日亦如之旦夕令人應接不暇數日來倦忘寢饑忘食病廢藥終夜大啟戶牗以納之早則堅臥不起金峰僧走候謂之曰為我寄語重維那道人近得二入室弟子清超絕倫僧曰二子為誰曰皆受馬簸箕記莂來日面佛月面佛僧擬議筆以付之曰可并示峰書狀潛子傳贊潛子不知何如人自得法先磬山力以大法為己任嗣住報恩數載雖百廢竝舉未嘗一事營心數千指日環擁叅請未嘗有一元字脚與人其許入室者愈臻玄奧愈爽然自失久追隨者多忘身為道高年碩德之侶主法不讓人情時有以認昭昭靈靈為得本以識神空為末後無疑者明辯其為狼䟦其胡載疐其尾復有死於棒下以心如牆壁為明道眼等者直斥其為將成九仞之山未進一簣之土皆苦其盲引眾盲非好辯也人不知而不慍其志潛值世危亂其時潛布袋和尚贈以偈曰一鉢千家飯孤身萬里遊青目睹人少問路白雲頭其行潛遂稱潛子贊曰汝何人斯其三代之直歟抑乘願而來續垂絕之脈者歟人徒描汝之形像汝只瞠目而熟視其潛子歟書先賢偈十方同聚會箇箇學無為此是選佛塲心空及第歸禪人看公案多不透脫為書此偈若曰此老僧之常談吾末如之何也已書示月庭邇江國春風吹不起鷓鴣啼在深林裏乳峰老人三十二相八十種好見此老一光者百千諸佛同時現前透此老一言勝透一大藏教咄山僧未免向佛頭上淋漓墨汁書屏栢𣗳子幾時成佛虗空落地時成佛虗空幾時落地栢𣗳子成佛時落地善財叅後誰相訪樓閣門開竟日閒䟦保寧勇禪師頌古煉得通紅打一鎚週遭無數火星飛十成好箇金剛鑽攤向門前賣與誰夜坐偶憶此頌不惟枯木頭陀通身毛孔皆笑直教大地山河草木昆蟲悉皆起舞偶言東坡云醉時是醒時語吾於今之言未生前者亦云䟦古成株大𣗳葢覆天下人去汝師黃檗非干我事引者風顛漢叅堂去百丈云一句子百味具足知言哉音釋閴苦臭切傾入聲寂靜也邗河干切音寒地名崒秦醉切音萃櫩移亷切音炎步廊勅封大覺普濟能仁國師塔銘洪惟世祖皇帝聖德顯道彰于遐邇深仁厚澤洽于幽明妙智圓通與如來心印為一嘗命訪僧伽之行解圓證者與論向上宗旨於時有大禪師奉詔入京曰玉琳琇公葢天隱磬山之子而臨濟三十一世孫也師諱通琇號玉琳常州江陰人族姓楊氏父芳母繆氏皆與般若有大因緣師之生也母夢大士携童子自牗入寤而生師墮地敏悟夙成能語輙誦佛號坐常跏趺十五閱語錄叅誰字疑情大𤼵寢食俱廢晝夜徬徨室中因觸翻溺器有省遂蟬蛻萬緣决意究竟大事時磬山修禪師方弘化荊溪爐韝正赤師直造其席依止受具戒為侍者進則决疑請益立雪不移退則宴默凝神危坐達旦必欲見道乃已一日于一口吸盡西江水下瞥見馬祖用處不覺身心慶快曰佛法落吾手矣自此遇勘辨𤼵語縱橫自如當機不讓無何辭歸省母磬山密囑徵信曰善自護持勿輕洩也師既歸江陰益韜晦日放曠雲水間偶乘月泛小舟舉頭頓忘迷悟如虗空玲瓏不可凑泊急就證天隱於武康之報恩叩擊之次迎刃不留至掀案而出隱知其透關歎曰此吾宗獅子兒也隱示寂遺命令師主法席師不從避之凌霄峰絕頂時天龍業已推出雖欲埋名煙壑而眾莫之許師不得已起應之開法筵之日黑白環遶者萬指莫不霑被化雨隨根沃潤而去丙戌過大雄樂其山川幽寂就荒煙蔓草葺𦮦為屋有終焉之志然聲光外流逐羶者益眾期年復成叢席是時天童方唱道東南其機鋒迅利諸方無能抗者惟師以法門猶子後先角立應機接物如疾雷破山龍泉出匣非真實證悟者不能窺其縱奪之妙以故年甚少出世最早而握機行令卷舒自由聞者莫不欽服焉順治戊戌世祖皇帝聞師名遣使詔師己亥春師應詔赴闕見上於外朝慰勞優渥即命近侍送居萬善殿不時臨訪道要一日問如何用工師曰端拱無為又問如何是大師云光被四表格於上下又問孔顏樂處師云憂心悄悄皇情大悅命近侍傳語恨相見之晚焉特賜號曰大覺禪師名香法衣之錫殆無虗日尋以母未塟懇乞還山詔許之出內府金錢助之襄事師受賜歸以十九飯僧放生而以其一助營塔費凡畚土運石一一皆身自為之庚子秋復詔至京禮遇尤渥進號大覺普濟能仁國師至臘月世尊成道日命於京師阜城門外慈壽寺為千五百僧說菩薩大戒又命作工夫說刊行之次年世祖皇帝升遐師領大弟子作佛事七晝夜畢辭還山欽命遣官護送其寵榮稠疊近代無與同者師雖遭際昌辰然性恬于榮利無毫髮矜重意既歸如野鶴孤雲無所留礙會於潛天目師子正宗禪寺歲久隤廢郡人順天少京兆岵瞻戴君謂非師無以舉揚宗風光輝祖席率眾延師居之遠邇學徒聞風奔赴堂序殆不能容於頹垣敗壁中一彈指間金輝碧明樓殿上插雲際而未嘗見其有所作為善權之請師雖勉強一赴然旋思歸老舊林亦未嘗久留也天性至孝十二歲即喪父得法後別構草堂于報恩之側奉母居之躬進飲饍母歿斷食禪定者七日行道不離𣩵次者三年先是師之父振陵翁與受雲栖大戒深味禪悅臨終染衣自度謂師兄弟不讀書即當出家母氏亦受磬山記莂晚年離俗依師得悟世號大慈老人葢非積慶之家不能生此大士而師具全戒孝友陳睦州大慧杲之風豈非契經所謂五因緣中真友者耶晚年慈心益切不憚䟦涉之勞意將窮搜泉石接引縛禪物外而不與塵世接者嘗歎曰趙州八十行脚彼何人哉乙卯春遂屏給侍飄然常往因觸熱渡江止於淮安清江浦之慈雲庵索浴趺坐說偈而逝時康熈乙卯八月十日也壽六十有二臘四十三弟子奉龕歸天目全身塔於東塢菴之後隴師凡六坐道塲七會說法解結𤼵覆妙具善巧雖沉迷重障一遭鉗鎚索無不斷絕焦芽小草一蒙溉灌身心無不光潤得法弟子二十餘人皆能傳燈續命接席分輝者也師廣額豐頤平頂大耳面白玉色目光烱烱射人宴坐如臨大眾故見者不威而攝一生不蓄私財即纖細供養亦不輕受嘗過青縣有苦行僧負斗設供隨舟行者數日師憐其誠為說法要即揮之使去終不納也每檀施至輒教以持歸放贖生命同於攝受雖膺紫衣之寵而服用不及恒僧既悟逸格之禪復教人兼修淨業五會弟子從師持藥師琉璃光如來名號得度者至不可筭數皆謂師從彼世界應化來此方云余昔從內廷間立法席之後親覩師據獅子座舉明正法𤼵轟雷掣電之機雖老叅宿學罔知所措既而閉關習靜龍象萃處一室而戶外不聞人聲至於廣廈細㫋從容詔對語巧意圓窮極實際能助九重增長法喜一時貴近無不函香問道師於弘法外不𤼵一言其善慧深厚如此是以緇素四眾罔不傾心馴至名德上聞于天寵被鴻名龍光赫奕則師豈非乘夙世願輪隨助聖人敷揚大化者乎謂之優曇鉢花千年一現良不誣也銘曰西來妙旨五燈分繼震動鏗鍧厥惟臨濟國師嗣法三十一傳金輪御曆佛日中天兜率親升演說般若光燭大千聲施九野應機而出乘願以來心光內發樓閣門開西江一吸劈靣全體布袋打失凡情𥁞死扁舟夜汎水月明融直入無見爍破虛空六坐道塲大施正令凡聖皈依天龍恭敬顯號榮名自天之祐開士何心白雲出岫天目高峰上摩穹碧師錫振飛祖生色寶臺珠網彈指立成隨順世間何經何營蘧廬終宿曳杖江口起滅空幻我尚不有坐脫淮上遊戲自如死生者誰隱現在吾六十二年悄然無事居士勒銘僅有半字康熈乙丑仲夏賜進士出身光祿大夫禮部尚書保和殿大學士加三級宛平王熈薰沐拜撰
